default:
  domain: homelab.local
  acmeEmail: your@email.com
  timezone: Australia/Melbourne
  storageClass: longhorn
  traefik:
    dashboardPass: "$$2y$$05$$replacethiswithyourhashedpassword"
    acme:
      email: "your@email.com"
      dnsChallenge:
        provider: cloudflare
        apiTokenSecretRef:
          name: cloudflare-credentials
          key: api-token
  imageDefaults:
    pullPolicy: IfNotPresent
    registry: docker.io
  monitoring:
    prometheus:
      retention: 30d
      storage: 10Gi
    grafana:
      adminPassword: "change_me"
      persistence: 5Gi
    loki:
      retention: 72h
      storage: 10Gi
    tempo:
      retention: 72h
      storage: 10Gi
    alertmanager:
      telegramBotToken: "your_bot_token"
      telegramChatId: "your_chat_id"
  infisical:
    authSecret: "change_me_32_chars"
    encryptionKey: "change_me_32_chars"
    redisPassword: "change_me_32_chars"
    dbPassword: "change_me_32_chars"
  authelia:
    jwtSecret: "change_me_32_chars"
    sessionSecret: "change_me_32_chars"
    storageEncryptionKey: "change_me_32_chars"
    dbPassword: "change_me_32_chars"
    redisPassword: "change_me_32_chars"
  crowdsec:
    dbPassword: "change_me_32_chars"
    apiKey: "your_crowdsec_key"
  vaultwarden:
    adminToken: "change_me_64_chars"
  nextcloud:
    adminPassword: "change_me"
    dbPassword: "change_me"
  redis:
    password: "change_me"
  restic:
    password: "change_me"
    repository: "b2:homelab-prod-backup:homelab-prod"
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6
  b2:
    accountId: "your_b2_account_id"
    accountKey: "your_b2_application_key"
    bucket: "homelab-prod-backup"
  cloudflare:
    apiToken: "your_cf_api_token"
  telegram:
    botToken: "your_bot_token"
    chatId: "your_chat_id"
  images:
    img_traefik: traefik:v3.0.4
    img_portainer: portainer/portainer-ce:2.21.5
    img_infisical: infisical/infisical:1.7.1
    img_authelia: authelia/authelia:4.38.0
    img_prometheus: prom/prometheus:v2.54.0
    img_grafana: grafana/grafana:11.1.3
    img_loki: grafana/loki:2.9.0
    img_promtail: grafana/promtail:2.9.0
    img_tempo: grafana/tempo:2.4.0
    img_alertmanager: prom/alertmanager:v0.26.0
    img_crowdsec: crowdsecurity/crowdsec:v1.6.0
    img_nextcloud: nextcloud:29.0.5
    img_mariadb: mariadb:11.4
    img_redis: redis:7.2-alpine
    img_vaultwarden: vaultwarden/server:1.32.6
    img_ollama: ollama/ollama:0.3.14
    img_homeassistant: homeassistant/home-assistant:stable
    img_uptime_kuma: louislam/uptime-kuma:1.23.9
    img_longhorn: longhornio/longhorn:v1.6.0
    img_certmanager: jetstack/cert-manager:v1.13.0
    img_external_dns: external-dns/external-dns:v1.15.0
    img_postgres_operator: zalando/postgres-operator:v1.13.0
    img_postgres: postgres:15-alpine
    img_redis: redis:7.2-alpine
    img_authelia_db: bitnami/postgresql:15.5.0
    img_authelia_redis: bitnami/redis:19.0.0
    img_cert_manager: jetstack/cert-manager:v1.13.0
    img_longhorn: longhornio/longhorn:v1.6.0
    img_postgres_operator: zalando/postgres-operator:v1.13.0
    img_redis_operator: spotahome/redis-operator:v1.1.0
    img_ollama: ollama/ollama:0.3.14
    img_uptime_kuma: louislam/uptime-kuma:1.23.9
    img_homeassistant: homeassistant/home-assistant:stable