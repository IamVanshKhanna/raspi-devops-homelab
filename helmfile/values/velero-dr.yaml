# Velero DR Schedule - Cross-region replication schedules

schedules:
  # Daily full backup to primary B2
  - name: daily-full-backup
    schedule: "0 2 * * *"  # 2 AM daily
    template:
      ttl: 72h
      includedNamespaces:
        - "*"
      excludedResources:
        - events
        - events.events.k8s.io
        - pods
        - replicasets
      storageLocation: primary-b2

  # Cross-region replication every 6 hours to DR S3
  - name: dr-replication-6h
    schedule: "0 */6 * * *"  # Every 6 hours
    template:
      ttl: 72h
      includedNamespaces:
        - "*"
      storageLocation: dr-region-s3

  # Weekly DR restore verification (Sunday 5 AM)
  - name: dr-restore-verification
    schedule: "0 5 * * 0"  # Weekly Sunday 5 AM
    template:
      ttl: 24h
      includedNamespaces:
        - apps
        - databases
        - secrets
        - auth
        - monitoring
        - logging
        - tracing
        - security
        - smarthome
        - uptime
        - ai
      storageLocation: dr-primary
      restoreOnly:
        namespaces:
          - "*"

  # Monthly full DR test (1st of month 3 AM)
  - name: monthly-dr-test
    schedule: "0 3 1 * *"  # Monthly 1st at 3 AM
    template:
      ttl: 48h
      includedNamespaces:
        - apps
        - databases
        - secrets
        - auth
        - monitoring
      storageLocation: dr-primary
      restoreOnly:
        namespaces:
          - "*"

  # Quarterly full DR failover test (quarterly 4 AM)
  - name: quarterly-dr-failover
    schedule: "0 4 1 */3 *"  # Quarterly 1st at 4 AM
    template:
      ttl: 72h
      includedNamespaces:
        - "*"
      storageLocation: dr-primary
      restoreOnly:
        namespaces:
          - "*"

# Velero DR configuration for cross-region replication
velero:
  config:
    # Primary cluster: backup to B2
    defaultBackupStorageLocation: primary-b2
    
    # DR cluster: read from DR bucket
    # defaultBackupStorageLocation: dr-primary
    
    # Cross-region replication
    enableCrossRegionReplication: true
    replicationTarget: dr-region-s3
    replicationInterval: 6h
    
    # DR verification
    drVerificationEnabled: true
    drVerificationSchedule: "0 5 * * 0"  # Weekly Sunday 5 AM
    drVerificationNamespaces:
      - apps
      - databases
      - secrets
      - auth
      - monitoring
      
  # Backup storage locations for cross-region
  backupStorageLocations:
    - name: primary-b2
      provider: aws
      bucket: homelab-velero-primary
      prefix: backups
      config:
        region: us-east-1
        s3Url: https://s3.us-east-005.backblazeb2.com
        s3ForcePathStyle: "true"
      credential:
        name: cloud-credentials
        key: cloud
      default: true
      
    - name: dr-region-s3
      provider: aws
      bucket: homelab-velero-dr
      prefix: backups
      config:
        region: us-west-2
      credential:
        name: cloud-credentials-dr
        key: cloud
      default: false
      
    - name: dr-primary
      provider: aws
      bucket: homelab-velero-dr
      prefix: backups
      config:
        region: us-west-2
      credential:
        name: cloud-credentials-dr
        key: cloud
      default: false
      accessMode: ReadOnly
      
  # Schedules will be created from the schedules section above
  includeSchedules: true