jwt_secret: "${AUTHELIA_JWT_SECRET}"

server:
  address: "tcp://0.0.0.0:9091/auth"

log:
  level: info

totp:
  issuer: homelab-prod

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      salt_length: 16
      parallelism: 4
      memory: 64

access_control:
  default_policy: deny
  rules:
    - domain: "192.168.68.59"
      policy: one_factor

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 3600
  inactivity: 1800
  domain: "192.168.68.59"
  same_site: lax
  remember_me: 2592000s

regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  encryption_key: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt
