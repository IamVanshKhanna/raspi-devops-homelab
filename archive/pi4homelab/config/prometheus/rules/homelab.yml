groups:
  - name: homelab-infrastructure
    interval: 30s
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.container }}"
          description: "{{ $labels.container }} memory usage is above 85% limit."

      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m]) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.container }}"
          description: "{{ $labels.container }} CPU usage is above 80% for 10 minutes."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/mnt/data"} / node_filesystem_size_bytes{mountpoint="/mnt/data"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical on /mnt/data"
          description: "Less than 10% free space on /mnt/data."

      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/mnt/data"} / node_filesystem_size_bytes{mountpoint="/mnt/data"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space warning on /mnt/data"
          description: "Less than 20% free space on /mnt/data."

  - name: homelab-containers
    interval: 30s
    rules:
      - alert: ContainerRestartLoop
        expr: increase(container_start_time_seconds[10m]) > 3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"
          description: "{{ $labels.name }} has restarted more than 3 times in 10 minutes."

      - alert: ContainerOOMKilled
        expr: container_last_seen_oom_killed == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} OOM killed"
          description: "{{ $labels.name }} was killed due to out of memory."

  - name: homelab-system
    interval: 60s
    rules:
      - alert: HighSystemMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "System memory usage above 90%"
          description: "Available memory critically low."

      - alert: HighSystemCPU
        expr: (1 - avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "System CPU usage above 85%"
          description: "CPU utilization sustained above 85%."

      - alert: CPUTempHigh
        expr: node_hwmon_temp_celsius > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU temperature above 75°C"
          description: "CPU temperature is {{ $value }}°C."

      - alert: CPUTempCritical
        expr: node_hwmon_temp_celsius > 80
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CPU temperature critical above 80°C"
          description: "CPU temperature is {{ $value }}°C - throttling likely."