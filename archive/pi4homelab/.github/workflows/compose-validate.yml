name: Compose Validate

on:
  push:
    paths:
      - 'stacks/**'
      - 'config/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'stacks/**'
      - 'config/**'
      - 'Makefile'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: docker/compose-action@v2

      - name: Validate all compose files
        run: |
          for stack in stacks/*/docker-compose.yml; do
            echo "Validating $stack..."
            docker compose -f "$stack" config >/dev/null
          done
          echo "All compose files valid"