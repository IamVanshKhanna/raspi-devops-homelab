# STACK: MONITORING-PI
# Minimal Pi-side monitoring - just node-exporter
# Prometheus + Grafana + Loki run on Windows (heavy worker)
# Node-exporter is scraped by Windows Prometheus over LAN

networks:
  proxy:
    external: true

services:

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    mem_limit: 32m
    cpus: 0.05
