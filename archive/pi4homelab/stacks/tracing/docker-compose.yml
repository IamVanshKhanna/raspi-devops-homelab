# STACK: TRACING — Tempo + OpenTelemetry Collector
# Distributed tracing for homelab services (single Pi)

version: "3.8"

networks:
  proxy:
    external: true

volumes:
  tempo_data:

services:
  tempo:
    image: grafana/tempo:2.4.0
    container_name: tempo
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    volumes:
      - tempo_data:/var/tempo
      - ../../config/tempo/tempo.yaml:/etc/tempo.yaml:ro
    command:
      - '-config.file=/etc/tempo.yaml'
    mem_limit: 512m
    cpus: 0.5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tempo.rule=Host(`tempo.${DOMAIN}`)"
      - "traefik.http.routers.tempo.entrypoints=websecure"
      - "traefik.http.routers.tempo.tls.certresolver=letsencrypt"
      - "traefik.http.services.tempo.loadbalancer.server.port=3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.0
    container_name: otel-collector
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    command:
      - "--config=/etc/otel-config.yaml"
    mem_limit: 512m
    cpus: 0.25
    depends_on:
      - tempo
    volumes:
      - ../../config/otel-collector-config.yaml:/etc/otel-config.yaml:ro