# STACK: NAS — Samba file sharing
# Local network file storage for the homelab
# Access via SMB (\\pi-homelab\data)


networks:
  proxy:
    external: true

volumes:
  samba_config:
  syncthing_data:

services:
  samba:
    # Simple Samba on Alpine
    image: alpine:latest
    container_name: samba
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "139:139"
      - "445:445"
    volumes:
      - ${DATA_DIR:-/mnt/data}:/mnt/data:rw
      - samba_config:/etc/samba
    command: >
      sh -c "
        apk add --no-cache samba &&
        echo -e '[global]\nworkgroup = HOMELAB\nsecurity = user\nmap to guest = bad user\n' > /etc/samba/smb.conf &&
        echo -e '[data]\npath = /mnt/data\nbrowseable = yes\nread only = no\nguest ok = yes\nforce user = root\nforce group = root' >> /etc/samba/smb.conf &&
        addgroup -g ${PGID:-1000} vansh &&
        adduser -u ${PUID:-1000} -G vansh -D -H -s /bin/false vansh &&
        echo -e '${SAMBA_PASSWORD:-changeme}\n${SAMBA_PASSWORD:-changeme}' | smbpasswd -a -s vansh &&
        smbd -F -d 2
      "
    environment:
      - TZ=${TZ:-Australia/Melbourne}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SAMBA_PASSWORD=${SAMBA_PASSWORD:-changeme}
    mem_limit: 256m
    cpus: 0.5
    labels:
      - "traefik.enable=false"


  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "8384:8384"
      - "22000:22000"
      - "21027:21027/udp"
    volumes:
      - syncthing_data:/var/syncthing
      - ${DATA_DIR:-/mnt/data}/sync:/data/sync:rw
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    mem_limit: 128m
    cpus: 0.25
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN}`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls.certresolver=letsencrypt"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"
