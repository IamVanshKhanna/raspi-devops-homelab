# STACK: AUTH - Authelia SSO + 2FA

networks:
  proxy:
    external: true

volumes:
  authelia_data:
  authelia_redis:

services:
  authelia:
    image: authelia/authelia:4.38.0
    container_name: authelia
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - proxy
    volumes:
      - ../../config/authelia/configuration.yml:/config/configuration.yml
      - ../../config/authelia/users_database.yml:/config/users_database.yml
      - authelia_data:/data
    environment:
      - TZ=${TZ}
      - DOMAIN=${DOMAIN}
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      - authelia-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"

  authelia-redis:
    image: redis:7-alpine
    container_name: authelia-redis
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - authelia_redis:/data
    command: redis-server --requirepass ${AUTHELIA_REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 64m
    cpus: 0.1
