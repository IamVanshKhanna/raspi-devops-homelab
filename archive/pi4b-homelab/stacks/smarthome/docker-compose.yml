# STACK: SMARTHOME
# Services: Home Assistant
# Uses host network for mDNS, Zigbee USB dongle, device discovery.
# Access directly at http://192.168.1.50:8123
# NOT routed through Traefik due to host network mode.

volumes:
  homeassistant_config:

services:

  homeassistant:
    # Use stable tag - HA releases frequently, :stable is safer than pinning
    # Check releases: https://github.com/home-assistant/core/releases
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - homeassistant_config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ}
    # Note: mem_limit not effective with network_mode: host on some kernels
    # Monitor via Grafana/cAdvisor instead
    mem_limit: 512m
    cpus: 1.0
    # If using Zigbee USB dongle, uncomment:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyACM0:/dev/ttyACM0
