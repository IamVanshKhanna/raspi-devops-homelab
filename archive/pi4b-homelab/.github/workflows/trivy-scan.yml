name: Trivy Scan

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 4 AM
  push:
    branches: [main]
    paths:
      - 'compose/**'
  workflow_dispatch:

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Extract images from compose files
        id: images
        run: |
          IMAGES=$(grep -h "image:" compose/*.yml | sed 's/.*image: *//' | sort -u)
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      - name: Scan images
        run: |
          for img in ${{ steps.images.outputs.images }}; do
            echo "Scanning $img..."
            trivy image --severity CRITICAL,HIGH --exit-code 0 --format sarif --output "trivy-$img.sarif" "$img" || true
          done

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-*.sarif'
          category: trivy