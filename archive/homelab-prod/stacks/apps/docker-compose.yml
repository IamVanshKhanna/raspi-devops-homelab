# STACK: APPS
# Services: Nextcloud + MariaDB + Redis + Vaultwarden + Ollama

networks:
  proxy:
    external: true
  # Internal network - DB/cache not exposed to Traefik proxy network
  apps_internal:
    internal: true

volumes:
  nextcloud_data:
  mariadb_data:
  redis_data:
  vaultwarden_data:
  ollama_data:

services:

  mariadb:
    # Check latest: https://hub.docker.com/_/mariadb
    image: mariadb:11.4
    container_name: mariadb
    restart: unless-stopped
    networks:
      - apps_internal
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TZ}
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Check latest: https://hub.docker.com/_/redis
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - apps_internal
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    # Check latest: https://hub.docker.com/_/nextcloud
    image: nextcloud:30.0.5
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - proxy
      - apps_internal
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_data:/var/www/html
      - ${DATA_DIR}/nextcloud/userdata:/var/www/html/data
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - TZ=${TZ}
    mem_limit: 1g
    cpus: 1.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.${DOMAIN}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"

  vaultwarden:
    # Check latest: https://github.com/dani-garcia/vaultwarden/releases
    image: vaultwarden/server:1.32.0
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - vaultwarden_data:/data
    environment:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - TZ=${TZ}
    mem_limit: 256m
    cpus: 0.5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"

  ollama:
    # Check latest: https://hub.docker.com/r/ollama/ollama/tags
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
    # Bind to localhost only - access via Traefik or SSH tunnel
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - TZ=${TZ}
    # LLM inference is RAM-heavy - cap to protect other services
    mem_limit: 2g
    cpus: 2.0
    # Pull models after deploy:
    # docker exec ollama ollama pull gemma:2b
    # docker exec ollama ollama pull llama3:8b
