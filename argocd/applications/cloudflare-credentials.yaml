apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-credentials
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: ""
    targetRevision: ""
    chart: ""
    helm:
      valueFiles: []
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true