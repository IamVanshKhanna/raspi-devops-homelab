# Loki Log Retention Policy
# Configuration for log retention in Loki
# Applied via: helm upgrade loki grafana/loki-stack -f loki-retention.yaml -n logging

# Retention settings for different log streams
# Based on:
# - Regulations (GDPR: 30-90 days for personal data)
# - Operational needs (debugging: 7-30 days)
# - Capacity planning (SSD lifespan, Longhorn capacity)
# - Cost optimization (S3/Longhorn storage costs)

global:
  retention:
    enabled: true
    # Default retention for all streams
    default: 168h  # 7 days
    # Per-stream overrides (regex match on labels)
    streams:
      # High-value operational logs - keep longer
      - selector: '{app=~"ollama|nextcloud|vaultwarden|homeassistant"}'
        retention: 720h  # 30 days
      # Security/audit logs - maximum retention
      - selector: '{job=~"crowdsec|authelia|traefik"}'
        retention: 2160h  # 90 days
      # Infrastructure logs - moderate retention
      - selector: '{job=~"prometheus|grafana|loki|promtail|tempo"}'
        retention: 336h  # 14 days
      # Debug/trace logs - short retention
      - selector: '{level=~"debug|trace"}'
        retention: 72h  # 3 days
      # Kubernetes audit logs
      - selector: '{job="k8s-audit"}'
        retention: 2160h  # 90 days

# Storage limits (hard cap)
limits_config:
  rejection_mode: "filter"
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 10MB
  max_entries_limit_per_query: 5000
  max_global_streams_per_user: 10000
  max_global_streams_per_tenant: 10000
  max_length_line: 1048576
  max_cache_freshness: 2h
  retention_stream:
    - stream: '{app=~"ollama|nextcloud|vaultwarden|homeassistant"}'
      retention: 720h
    - stream: '{job=~"crowdsec|authelia|traefik"}'
      retention: 2160h
    - stream: '{job=~"prometheus|grafana|loki|promtail|tempo"}'
      retention: 336h
    - stream: '{level=~"debug|trace"}'
      retention: 72h
    - stream: '{job="k8s-audit"}'
      retention: 2160h

# Chunk store limits
chunk_store_config:
  max_look_back_period: 0s  # No limit on query lookback

# Query limits
query_limits:
  max_cache_freshness: 2h
  max_age: 2160h  # Maximum query time range