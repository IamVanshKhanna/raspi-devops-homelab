apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-rules
  namespace: monitoring
data:
  global-alerts.yaml: |
    groups:
    - name: thanos-global
      rules:
      - alert: ClusterDown
        expr: up{job="prometheus"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cluster {{ $labels.cluster }} is down"
          
      - alert: ClusterHighCPU
        expr: |
          (sum by (cluster) (rate(container_cpu_usage_seconds_total[5m])) / sum by (cluster) (kube_node_status_capacity_cpu_cores)) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Cluster {{ $labels.cluster }} high CPU usage"
          
      - alert: ThanosStoreGatewayDown
        expr: up{job="thanos-store-gateway"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Thanos Store Gateway down"
          
      - alert: ThanosCompactorDown
        expr: up{job="thanos-compactor"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Thanos Compactor down"
          
      - alert: ThanosRulerDown
        expr: up{job="thanos-ruler"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Thanos Ruler down"
          
      - alert: ClusterHighMemory
        expr: |
          (sum by (cluster) (container_memory_working_set_bytes) / sum by (cluster) (kube_node_status_capacity_memory_bytes)) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Cluster {{ $labels.cluster }} high memory usage"
          
      - alert: ClusterHighDiskUsage
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/mnt/data"} / node_filesystem_size_bytes{mountpoint="/mnt/data"})) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Cluster {{ $labels.cluster }} high disk usage"