# Authelia Users Database
# Passwords are argon2id hashed
# Generate: authelia crypto hash generate argon2id --password 'your-password'
# Or use: docker run --rm authelia/authelia:4.38.0 authelia crypto hash generate argon2id --password 'your-password'

users:
  vansh:
    displayname: "Vansh"
    password: "$argon2id$v=19$m=65536,t=3,p=4$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    email: vanshkhanna416@gmail.com
    groups:
      - admins
      - users

