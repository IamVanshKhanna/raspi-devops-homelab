jwt_secret: "${AUTHELIA_JWT_SECRET}"

default_redirection_url: https://home.homelab.local

server:
  host: 0.0.0.0
  port: 9091
  path: ""
  buffers:
    read: 4096
    write: 4096
  endpoints:
    enable_pprof: false
    enable_expvars: false

log:
  level: info
  format: json
  file_path: /data/authelia.log
  keep_stdout: true

totp:
  issuer: homelab-prod
  algorithm: sha1
  digits: 6
  period: 30
  skew: 1

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      salt_length: 16
      parallelism: 4
      memory: 64
    watch: true

access_control:
  default_policy: deny
  rules:
    - domain: "auth.homelab.local"
      policy: bypass
    - domain:
        - "traefik.homelab.local"
        - "portainer.homelab.local"
        - "grafana.homelab.local"
        - "cloud.homelab.local"
        - "vault.homelab.local"
        - "uptime.homelab.local"
      policy: two_factor
    - domain: "*.homelab.local"
      policy: two_factor

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 3600
  inactivity: 1800
  domain: homelab.local
  same_site: lax
  remember_me: 2592000s

regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  encryption_key: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt
