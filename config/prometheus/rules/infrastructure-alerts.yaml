# Consolidated Infrastructure Alerts
# Merges: homelab.yml + k8s-cluster.yaml (deduplicated)
# Applied via kube-prometheus-stack PrometheusRule

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-infrastructure-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: homelab-infrastructure
    interval: 30s
    rules:
    # Instance & Container Health
    - alert: InstanceDown
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Instance {{ $labels.instance }} down"
        description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: ContainerRestartLoop
      expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarting frequently"
        description: "{{ $labels.name }} has restarted more than 3 times in 10 minutes."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: ContainerOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0s
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} OOM killed"
        description: "{{ $labels.container }} in pod {{ $labels.pod }} was killed due to out of memory."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: HighMemoryUsage
      expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage on {{ $labels.container }}"
        description: "{{ $labels.container }} memory usage is above 85% limit."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: HighCPUUsage
      expr: (rate(container_cpu_usage_seconds_total[5m]) * 100) > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage on {{ $labels.container }}"
        description: "{{ $labels.container }} CPU usage is above 80% for 10 minutes."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/rightsizing.md"

    # Kubernetes Workload Health
    - alert: K8sDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"} != kube_deployment_spec_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"}
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Deployment {{ $labels.deployment }} replica mismatch"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} replicas, expected {{ kube_deployment_spec_replicas{namespace=$labels.namespace, deployment=$labels.deployment} }}"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/pdb-validation.md"

    - alert: K8sPodNotReady
      expr: |
        sum by (namespace, pod) (kube_pod_container_status_ready{condition="true"} == 0) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: K8sPVCPending
      expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is pending"
        description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} has been pending for more than 5 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: K8sNodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.node }} not ready"
        description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    # Node / System Health
    - alert: NodeHighCPU
      expr: |
        100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} high CPU usage"
        description: "CPU usage on {{ $labels.instance }} is above 80% for 10 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/rightsizing.md"

    - alert: NodeHighMemory
      expr: |
        100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} high memory usage"
        description: "Memory usage on {{ $labels.instance }} is above 85% for 10 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: NodeDiskFull
      expr: |
        100 * (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.instance }} disk almost full"
        description: "Disk space on {{ $labels.instance }} is above 90%"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: NodeTempHigh
      expr: node_hwmon_temp_celsius > 75
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} temperature high"
        description: "CPU temperature on {{ $labels.instance }} is {{ $value }}°C"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/power-optimization.md"

    - alert: NodeTempCritical
      expr: node_hwmon_temp_celsius > 80
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.instance }} temperature critical"
        description: "CPU temperature on {{ $labels.instance }} is {{ $value }}°C - throttling likely"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/power-optimization.md"

    # Disk Space (homelab-specific)
    - alert: DiskSpaceCritical
      expr: |
        (node_filesystem_avail_bytes{mountpoint="/mnt/data"} / node_filesystem_size_bytes{mountpoint="/mnt/data"}) < 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Disk space critical on /mnt/data"
        description: "Less than 10% free space on /mnt/data."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: DiskSpaceWarning
      expr: |
        (node_filesystem_avail_bytes{mountpoint="/mnt/data"} / node_filesystem_size_bytes{mountpoint="/mnt/data"}) < 0.2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Disk space warning on /mnt/data"
        description: "Less than 20% free space on /mnt/data."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    # System-wide
    - alert: HighSystemMemory
      expr: |
        (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "System memory usage above 90%"
        description: "Available memory critically low."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/quota-exceeded.md"

    - alert: HighSystemCPU
      expr: |
        (1 - avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "System CPU usage above 85%"
        description: "CPU utilization sustained above 85%."
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/rightsizing.md"

  - name: longhorn-storage
    rules:
    - alert: LonghornVolumeDegraded
      expr: |
        longhorn_volume_actual_state{state=~"degraded|faulted"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Longhorn volume {{ $labels.volume }} degraded"
        description: "Longhorn volume {{ $labels.volume }} is in degraded state"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/backup-failure.md"

    - alert: LonghornReplicaFailure
      expr: |
        longhorn_replica_state{state="FAULTED"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Longhorn replica {{ $labels.replica }} failed"
        description: "Longhorn replica {{ $labels.replica }} for volume {{ $labels.volume }} is faulted"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/backup-failure.md"

    - alert: LonghornBackupFailed
      expr: |
        longhorn_backup_status{state="Error"} == 1
      for: 0s
      labels:
        severity: critical
      annotations:
        summary: "Longhorn backup failed for volume {{ $labels.volume }}"
        description: "Backup for volume {{ $labels.volume }} failed with error: {{ $labels.error }}"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/backup-failure.md"

  - name: homelab-applications
    rules:
    # Deployments
    - alert: K8sDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"} != kube_deployment_spec_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"}
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Deployment {{ $labels.deployment }} replica mismatch"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} replicas, expected {{ kube_deployment_spec_replicas{namespace=$labels.namespace, deployment=$labels.deployment} }}"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/pdb-validation.md"

    - alert: K8sPodNotReady
      expr: |
        sum by (namespace, pod) (kube_pod_container_status_ready{condition="true"} == 0) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: K8sContainerRestartLoop
      expr: |
        increase(kube_pod_container_status_restarts_total[15m]) > 3
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarting frequently"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 3 times in 15 minutes"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"

    - alert: K8sContainerOOMKilled
      expr: |
        kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0s
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} OOM killed"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was killed due to out of memory"
        runbook_url: "https://github.com/IamVanshKhanna/homelab-prod/blob/main/docs/runbooks/service-down.md"