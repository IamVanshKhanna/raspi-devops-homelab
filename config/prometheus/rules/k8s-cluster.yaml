apiVersion: v4
kind: HTTP
metadata:
  name: kube-prometheus-stack-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
data:
  groups:
  - name: kubernetes-apps
    rules:
    - alert: K8sDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"} != kube_deployment_spec_replicas{namespace=~"apps|monitoring|security|auth|ai|uptime|smarthome"}
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Deployment {{ $labels.deployment }} replica mismatch"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} replicas, expected {{ kube_deployment_spec_replicas{namespace=$labels.namespace, deployment=$labels.deployment} }}"
    - alert: K8sPodNotReady
      expr: |
        sum by (namespace, pod) (kube_pod_container_status_ready{condition="true"} == 0) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes"
    - alert: K8sContainerRestartLoop
      expr: |
        increase(kube_pod_container_status_restarts_total[15m]) > 3
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarting frequently"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 3 times in 15 minutes"
    - alert: K8sPVCPending
      expr: |
        kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is pending"
        description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} has been pending for more than 5 minutes"
    - alert: K8sNodeNotReady
      expr: |
        kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.node }} not ready"
        description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"
    - alert: K8sContainerOOMKilled
      expr: |
        kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0s
      labels:
        severity: critical
      annotations:
        summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} OOM killed"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was killed due to out of memory"

  - name: node-exporter
    rules:
    - alert: NodeHighCPU
      expr: |
        100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} high CPU usage"
        description: "CPU usage on {{ $labels.instance }} is above 80% for 10 minutes"
    - alert: NodeHighMemory
      expr: |
        100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} high memory usage"
        description: "Memory usage on {{ $labels.instance }} is above 85% for 10 minutes"
    - alert: NodeDiskFull
      expr: |
        100 * (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.instance }} disk almost full"
        description: "Disk space on {{ $labels.instance }} is above 90%"
    - alert: NodeTempHigh
      expr: |
        node_hwmon_temp_celsius > 75
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} temperature high"
        description: "CPU temperature on {{ $labels.instance }} is {{ $value }}°C"

  - name: longhorn
    rules:
    - alert: LonghornVolumeDegraded
      expr: |
        longhorn_volume_actual_state{state~="degraded|faulted"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Longhorn volume {{ $labels.volume }} degraded"
        description: "Longhorn volume {{ $labels.volume }} is in degraded state"
    - alert: LonghornReplicaFailure
      expr: |
        longhorn_replica_state{state="FAULTED"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Longhorn replica {{ $labels.replica }} failed"
        description: "Longhorn replica {{ $labels.replica }} for volume {{ $labels.volume }} is faulted"
    - alert: LonghornBackupFailed
      expr: |
        longhorn_backup_status{state="Error"} == 1
      for: 0s
      labels:
        severity: critical
      annotations:
        summary: "Longhorn backup failed for volume {{ $labels.volume }}"
        description: "Backup for volume {{ $labels.volume }} failed with error: {{ $labels.error }}"