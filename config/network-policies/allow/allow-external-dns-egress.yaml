apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-dns-allow-egress
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []  # Allow external egress to Cloudflare API
      ports:
        - protocol: TCP
          port: 443