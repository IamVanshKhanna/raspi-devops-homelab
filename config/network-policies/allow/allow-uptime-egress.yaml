apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uptime-allow-egress
  namespace: uptime
  labels:
    app.kubernetes.io/name: uptime-kuma
    policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []  # Allow external egress for HTTP/HTTPS health checks
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443