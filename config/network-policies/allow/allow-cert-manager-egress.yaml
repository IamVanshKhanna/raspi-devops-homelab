apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-allow-egress
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
    policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []  # Allow external egress to Cloudflare API, Let's Encrypt
      ports:
        - protocol: TCP
          port: 443