apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smarthome-allow-egress
  namespace: smarthome
  labels:
    app.kubernetes.io/name: homeassistant
    policy-type: allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []  # Allow external egress for IoT device discovery, cloud integrations
      ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 5353  # mDNS