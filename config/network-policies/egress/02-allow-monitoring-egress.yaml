# Allow Monitoring Egress (Prometheus, Loki, Tempo)
# Usage: sed 's/NAMESPACE/<your-namespace>/g' | kubectl apply -f -

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
  namespace: NAMESPACE
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        ports:
          - protocol: TCP
            port: 9090
          - protocol: TCP
            port: 3100
          - protocol: TCP
            port: 4317
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
        ports:
          - protocol: TCP
            port: 3100
