# Allow External Secrets Egress (Infisical)
# Usage: sed 's/NAMESPACE/<your-namespace>/g' | kubectl apply -f -

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-secrets-egress
  namespace: NAMESPACE
spec:
  podSelector:
    matchLabels:
      infisical.secret: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: secrets
        ports:
          - protocol: TCP
            port: 443
