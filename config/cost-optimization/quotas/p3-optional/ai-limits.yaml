apiVersion: v1
kind: LimitRange
metadata:
  name: ai-limits
  namespace: ai
spec:
  limits:
  - type: Container
    default:
      cpu: "250m"
      memory: "512Mi"
    defaultRequest:
      cpu: "25m"
      memory: "64Mi"
    max:
      cpu: "250m"
      memory: "512Mi"
    min:
      cpu: "10m"
      memory: "32Mi"
