apiVersion: v1
kind: LimitRange
metadata:
  name: tracing-limits
  namespace: tracing
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "500m"
      memory: "1Gi"
    min:
      cpu: "10m"
      memory: "32Mi"
