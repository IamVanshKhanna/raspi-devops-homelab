apiVersion: v1
kind: ResourceQuota
metadata:
  name: logging-quota
  namespace: logging
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    requests.storage: "50Gi"
    persistentvolumeclaims: "10"
    pods: "30"
    services: "15"
    secrets: "20"
    configmaps: "20"
