apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litmus-admin
rules:
  - apiGroups: ["", "litmuschaos.io", "batch", "apps", "argoproj.io"]
    resources: ["pods", "pods/log", "events", "chaosengines", "chaosexperiments", "chaosresults", "jobs", "deployments", "workflows"]
    verbs: ["create", "list", "get", "patch", "update", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["list", "get"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "list", "get", "patch", "update", "delete"]