apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: litmus-node-drain-scheduled
  namespace: litmus
spec:
  templates:
    - name: node-drain-chaos
      container:
        image: litmuschaos/litmus-checker:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            kubectl apply -f /experiments/node-drain.yaml
            sleep 5
            kubectl wait --for=condition=Completed chaosengine/node-drain -n litmus --timeout=600s
    - name: cleanup
      container:
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "-c"]
        args:
          - kubectl delete chaosengine node-drain -n litmus --ignore-not-found=true
  entrypoint: node-drain-chaos
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: node-drain-monthly
  namespace: litmus
spec:
  schedule: "0 5 1 * *"  # Monthly on 1st at 5 AM
  concurrencyPolicy: "Forbid"
  startingDeadlineSeconds: 300
  workflowSpec:
    workflowTemplateRef:
      name: litmus-node-drain-scheduled