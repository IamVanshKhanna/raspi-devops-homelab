# Traefik Cache Warming Middleware
# Pre-populates cache for critical endpoints

## 1. Cache Warming CronJob

apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-warmer
  namespace: traefik
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cache-warmer
          containers:
          - name: cache-warmer
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c
            - |
              # Warm critical endpoints
              ENDPOINTS=(
                "https://nextcloud.homelab.local/status.php"
                "https://nextcloud.homelab.local/index.php/login"
                "https://nextcloud.homelab.local/ocs/v2.php/apps/notifications/api/v2/notifications"
                "https://vaultwarden.homelab.local/alive"
                "https://grafana.homelab.local/api/health"
                "https://prometheus.homelab.local/-/healthy"
                "https://loki.homelab.local/ready"
                "https://tempo.homelab.local/ready"
                "https://alertmanager.homelab.local/-/ready"
              )
              
              for endpoint in "${ENDPOINTS[@]}"; do
                echo "Warming: $endpoint"
                curl -sf -H "Accept-Encoding: br, gzip, deflate" \
                  -H "X-Cache-Warm: true" \
                  -o /dev/null \
                  --max-time 30 \
                  "$endpoint" || echo "Failed to warm: $endpoint"
                sleep 1
              done
              
              # Warm static assets via Traefik
              STATIC_PATHS=(
                "https://nextcloud.homelab.local/core/css/server.css"
                "https://nextcloud.homelab.local/core/js/dist/main.js"
                "https://nextcloud.homelab.local/apps/dashboard/js/dashboard.js"
                "https://vaultwarden.homelab.local/static/css/main.css"
                "https://vaultwarden.homelab.local/static/js/main.js"
              )
              
              for asset in "${STATIC_PATHS[@]}"; do
                curl -sf -H "Accept-Encoding: br, gzip, deflate" \
                  -H "X-Cache-Warm: true" \
                  -o /dev/null \
                  --max-time 15 \
                  "$asset" || true
                sleep 0.5
              done
              
              echo "Cache warming completed at $(date)"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          restartPolicy: OnFailure
---
## 2. Service Account and RBAC

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cache-warmer
  namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cache-warmer
  namespace: traefik
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cache-warmer
  namespace: traefik
subjects:
- kind: ServiceAccount
  name: cache-warmer
  namespace: traefik
roleRef:
  kind: Role
  name: cache-warmer
  apiGroup: rbac.authorization.k8s.io
---
## 3. Cache Invalidation Webhook (for deployments)

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cache-invalidation
  namespace: traefik
spec:
  plugin:
    cache-invalidation:
      # Invalidate cache on deployment
      triggers:
        - type: "deployment"
          namespaces: ["apps", "monitoring", "traefik"]
          on:
            - "create"
            - "update"
            - "delete"
      # Or via HTTP header
      header: "X-Cache-Invalidate"
      cacheTags:
        - "traefik"
        - "homelab"
---
## 4. Application-Level Cache Warming (Nextcloud)

```php
// nextcloud/config/cache-warming.php
// Run via cron: */5 * * * * php /var/www/html/occ cache:warm

namespace OCA\CacheWarming;

use OCP\IConfig;
use OCP\ICache;
use OCP\ICacheFactory;
use OCP\AppFramework\Http;
use OCP\IRequest;

class CacheWarmer {
    private ICache $cache;
    private IConfig $config;
    
    public function __construct(ICacheFactory $cacheFactory, IConfig $config) {
        $this->cache = $cacheFactory->create('warming');
        $this->config = $config;
    }
    
    public function warm(): int {
        $warmed = 0;
        
        // Warm app info cache
        $apps = \OC_App::getEnabledApps();
        foreach ($apps as $app) {
            $info = \OC_App::getAppInfo($app);
            if ($info) {
                $this->cache->set("appinfo:$app", $info, 3600);
                $warmed++;
            }
        }
        
        // Warm MIME type cache
        $mimes = \OC_MimeTypeDetector::getMimeTypes();
        foreach ($mimes as $ext => $mime) {
            $this->cache->set("mimetype:$ext", $mime, 86400);
            $warmed++;
        }
        
        // Warm user avatars
        $users = \OC_User::getUsers();
        foreach (array_slice($users, 0, 50) as $user) {
            $avatar = \OC_User::getAvatar($user, 64);
            if ($avatar) {
                $this->cache->set("avatar:$user:64", $avatar, 3600);
                $warmed++;
            }
        }
        
        // Warm system config
        $configs = [
            'version', 'theme', 'enabledApps', 'installed',
            'maintenance', 'singleuser', 'forcessl'
        ];
        foreach ($configs as $key) {
            $value = $this->config->getSystemValue($key);
            if ($value !== null) {
                $this->cache->set("systemconfig:$key", $value, 3600);
                $warmed++;
            }
        }
        
        return $warmed;
    }
    
    public function warmForUser(string $userId): int {
        $warmed = 0;
        
        // Warm user-specific caches
        $this->cache->set("user:$userId:files", \OC_Files::getFiles($userId), 1800);
        $warmed++;
        
        $this->cache->set("user:$userId:shares", \OCP\Share::getSharesByUser($userId), 1800);
        $warmed++;
        
        $this->cache->set("user:$userId:calendars", \OCA\Calendar\Controller\CalController::getCalendars($userId), 1800);
        $warmed++;
        
        return $warmed;
    }
}
```

