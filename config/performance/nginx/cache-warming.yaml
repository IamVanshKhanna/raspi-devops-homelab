## 7. Combined Cache Warming CronJob

apiVersion: batch/v1
kind: CronJob
metadata:
  name: combined-cache-warmer
  namespace: databases
spec:
  schedule: "*/10 * * * *"  # Every 10 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cache-warmer
          initContainers:
          - name: wait-for-db
            image: curlimages/curl:latest
            command: ['sh', '-c', 'until pg_isready -h homelab-postgres.databases -p 5432; do sleep 2; done']
          - name: wait-for-redis
            image: redis:7-alpine
            command: ['sh', '-c', 'until redis-cli -h homelab-redis.databases ping | grep -q PONG; do sleep 2; done']
          containers:
          - name: pg-warmer
            image: postgres:16-alpine
            command: ['/bin/sh', '-c']
            args:
              - |
                /pg-warm.sh
            volumeMounts:
            - name: pg-warm-script
              mountPath: /pg-warm.sh
              subPath: pg-warm.sh
          - name: redis-warmer
            image: redis:7-alpine
            command: ['/bin/sh', '-c']
            args:
              - |
                /redis-cache-warm.sh
            volumeMounts:
            - name: redis-warm-script
              mountPath: /redis-cache-warm.sh
              subPath: redis-cache-warm.sh
          - name: http-warmer
            image: curlimages/curl:latest
            command: ['/bin/sh', '-c']
            args:
              - |
                /cache-warmer.sh
            volumeMounts:
            - name: http-warmer-script
              mountPath: /cache-warmer.sh
              subPath: cache-warmer.sh
          volumes:
          - name: pg-warm-script
            configMap:
              name: pg-warm-script
              defaultMode: 0755
          - name: redis-warm-script
            configMap:
              name: redis-warm-script
              defaultMode: 0755
          - name: http-warmer-script
            configMap:
              name: http-warmer-script
              defaultMode: 0755
          restartPolicy: OnFailure
---
