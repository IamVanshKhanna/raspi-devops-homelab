## 6. PostgreSQL Cache Warming (pg_prewarm)

```sql
-- Enable pg_prewarm extension
CREATE EXTENSION IF NOT EXISTS pg_prewarm;

-- Warm critical tables into shared_buffers
SELECT pg_prewarm('pgbench_accounts');
SELECT pg_prewarm('pgbench_branches');
SELECT pg_prewarm('pgbench_tellers');
SELECT pg_prewarm('pgbench_history');

-- Warm indexes
SELECT pg_prewarm('pgbench_accounts_pkey');
SELECT pg_prewarm('idx_pgbench_accounts_bid');

-- Warm specific relations for Nextcloud
SELECT pg_prewarm('oc_filecache');
SELECT pg_prewarm('oc_share');
SELECT pg_prewarm('oc_share_external');
SELECT pg_prewarm('oc_activity');
SELECT pg_prewarm('oc_notifications');

-- Verify warming
SELECT relname, pg_prewarm(relname) as blocks_warmed
FROM pg_stat_user_tables
WHERE schemaname = 'public'
ORDER BY seq_scan DESC
LIMIT 20;
```

```bash
#!/bin/bash
# pg-warm.sh - Warm PostgreSQL cache
# Schedule: After PostgreSQL restart, or every hour

set -euo pipefail

PGHOST="${PGHOST:-homelab-postgres.databases.svc.cluster.local}"
PGPORT="${PGPORT:-5432}"
PGDATABASE="${PGDATABASE:-homelab_db}"
PGUSER="${PGUSER:-admin}"

log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"; }

# Warm tables
TABLES=(
  "oc_filecache"
  "oc_share"
  "oc_share_external"
  "oc_activity"
  "oc_notifications"
  "oc_filestreams"
  "oc_file_locks"
  "oc_properties"
  "oc_jobs"
  "oc_schedulingobjects"
)

for table in "${TABLES[@]}"; do
    log "Warming $table..."
    if psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" \
       -c "SELECT pg_prewarm('$table');" >/dev/null 2>&1; then
        log "✅ Warmed $table"
    else
        log "⚠️ Failed to warm $table (may not exist)"
    fi
done

# Warm indexes
INDEXES=(
  "oc_filecache_path_index"
  "oc_filecache_storage_mtime"
  "oc_share_shared_with"
  "oc_share_item_type_id"
  "oc_activity_app"
  "oc_notifications_user"
)

for index in "${INDEXES[@]}"; do
    log "Warming index $index..."
    psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" \
       -c "SELECT pg_prewarm('$index');" >/dev/null 2>&1 && \
       log "✅ Warmed $index" || log "⚠️ Failed $index"
done

log "PostgreSQL cache warming completed"
```

