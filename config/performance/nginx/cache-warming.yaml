## 5. Redis Cache Warming Script

```bash
#!/bin/bash
# redis-cache-warm.sh - Pre-populate Redis with hot keys
# Schedule: Every 10 minutes via CronJob

set -euo pipefail

REDIS_HOST="${REDIS_HOST:-homelab-redis.databases.svc.cluster.local}"
REDIS_PORT="${REDIS_PORT:-6379}"
REDIS_PASSWORD="${REDIS_PASSWORD}"

# Keys to warm (format: key:type:ttl:value_source)
WARM_KEYS=(
  "session:active:1800:SELECT DISTINCT session_id FROM sessions WHERE last_activity > NOW() - INTERVAL 30 MINUTE"
  "user:online:300:SELECT user_id FROM users WHERE last_login > NOW() - INTERVAL 5 MINUTE"
  "config:app:3600:SELECT key, value FROM app_config WHERE is_public = 1"
  "stats:dashboard:60:SELECT json_build_object('users', (SELECT count(*) FROM users), 'files', (SELECT count(*) FROM files))"
)

log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"; }

for entry in "${WARM_KEYS[@]}"; do
    IFS=':' read -r key type ttl query <<< "$entry"
    
    log "Warming $key (type: $type, TTL: ${ttl}s)"
    
    # Execute query and store in Redis
    # This is a template - actual implementation depends on your data source
    if redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$REDIS_PASSWORD" \
       SETEX "$key" "$ttl" "$(psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -c "$query" | tr -d '\n')" 2>/dev/null; then
        log "✅ Warmed $key"
    else
        log "⚠️ Failed to warm $key"
    fi
done

# Warm Nextcloud-specific keys
if redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$REDIS_PASSWORD" EXISTS "nextcloud:apps:enabled" >/dev/null 2>&1; then
    log "Nextcloud cache already warm"
else
    # Populate from Nextcloud
    APPS=$(redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$REDIS_PASSWORD" GET "nextcloud:apps:enabled")
    if [ -z "$APPS" ]; then
        log "Priming Nextcloud app list..."
        # This would typically be done via Nextcloud CLI
    fi
fi

log "Redis cache warming completed"
```

