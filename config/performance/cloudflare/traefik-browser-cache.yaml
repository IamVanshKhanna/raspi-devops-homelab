# Browser Cache Middleware - Long-term caching for static assets
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: browser-cache
  namespace: traefik
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "public, max-age=31536000, immutable"
      Vary: "Accept-Encoding"
      # Remove server header for security
      Server: ""
    # Optionally remove ETag for better caching
    # customRequestHeaders:
    #   If-None-Match: ""