# Traefik Compression & Performance Configuration
# Brotli + Zstd + Gzip optimization

## 1. Compression Middleware

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress-brotli
  namespace: traefik
spec:
  compress:
    # Enable multiple compression algorithms in order of preference
    # Brotli (best ratio) -> Zstd (fast) -> Gzip (compatible)
    algorithms:
      - "br"
      - "zstd"
      - "gzip"
    # Only compress text-based content
    includedContentTypes:
      - "text/html"
      - "text/css"
      - "text/javascript"
      - "text/plain"
      - "text/xml"
      - "text/json"
      - "application/javascript"
      - "application/json"
      - "application/xml"
      - "application/rss+xml"
      - "application/atom+xml"
      - "application/geo+json"
      - "application/ld+json"
      - "application/manifest+json"
      - "application/x-javascript"
      - "application/x-web-app-manifest+json"
      - "application/xhtml+xml"
      - "application/rdf+xml"
      - "font/woff"
      - "font/woff2"
      - "font/ttf"
      - "font/otf"
      - "font/sfnt"
      - "image/svg+xml"
      - "image/x-icon"
    # Never compress already-compressed binary content
    excludedContentTypes:
      - "image/*"
      - "video/*"
      - "audio/*"
      - "application/zip"
      - "application/gzip"
      - "application/x-gzip"
      - "application/x-bzip2"
      - "application/x-rar"
      - "application/x-7z-compressed"
      - "application/octet-stream"
    # Minimum size to compress (bytes)
    minResponseBodyBytes: 1024
    # Compression level (1-11 for brotli, 1-22 for zstd, 1-9 for gzip)
    # Note: Traefik uses library defaults, adjust via Go runtime if needed

---
## 2. Apply Compression to All Routes

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-compressed
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.homelab.local`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
      middlewares:
        - name: compress-brotli
        - name: security-headers
  tls:
    certResolver: letsencrypt

---
## 3. Nextcloud Compression (special handling for WebDAV)

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-compress
  namespace: apps
spec:
  compress:
    algorithms: ["br", "zstd", "gzip"]
    excludedContentTypes:
      # WebDAV operations should not be compressed
      - "application/davmount+xml"
      - "application/vnd.ms-fontobject"
      - "application/x-font-ttf"
      - "application/x-font-opentype"
    minResponseBodyBytes: 512

---
## 4. API Routes - Selective Compression

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-compress
  namespace: apps
spec:
  compress:
    algorithms: ["br", "zstd", "gzip"]
    # Only compress JSON responses
    includedContentTypes:
      - "application/json"
      - "application/geo+json"
      - "application/ld+json"
    minResponseBodyBytes: 256

---
## 5. Static Assets - Aggressive Caching + Compression

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: static-assets
  namespace: traefik
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "public, max-age=31536000, immutable"
      Vary: "Accept-Encoding"
    # Remove server header
    customRequestHeaders:
      X-Forwarded-Proto: "https"
  compress:
    algorithms: ["br", "zstd", "gzip"]
    # Compress all static asset types
    includedContentTypes:
      - "text/css"
      - "text/javascript"
      - "application/javascript"
      - "font/woff"
      - "font/woff2"
      - "font/ttf"
      - "image/svg+xml"
      - "application/wasm"
    minResponseBodyBytes: 512

---
## 6. Brotli/Zstd Build Requirements

# Traefik v3+ includes brotli and zstd by default
# For custom builds, ensure these tags:
# 
# go build -tags "brotli zstd" ./cmd/traefik
#
# Or use official Docker image which includes them:
# docker.io/traefik:v3.0 (includes brotli, zstd)

---
## 7. Verification Commands

```bash
# Test Brotli compression
curl -H "Accept-Encoding: br" -I https://nextcloud.homelab.local/
# Should see: content-encoding: br

# Test Zstd compression  
curl -H "Accept-Encoding: zstd" -I https://nextcloud.homelab.local/
# Should see: content-encoding: zstd

# Test Gzip fallback
curl -H "Accept-Encoding: gzip" -I https://nextcloud.homelab.local/
# Should see: content-encoding: gzip

# Verify no compression for images
curl -H "Accept-Encoding: br" -I https://nextcloud.homelab.local/logo.png
# Should NOT have content-encoding header

# Check compression ratio
curl -H "Accept-Encoding: br" -s https://nextcloud.homelab.local/ | wc -c
curl -H "Accept-Encoding: identity" -s https://nextcloud.homelab.local/ | wc -c
```

---
## 8. Performance Monitoring

```promql
# Compression ratio
sum(rate(traefik_service_requests_total{compression="br"}[5m])) / sum(rate(traefik_service_requests_total[5m]))

# Average response size by encoding
histogram_quantile(0.5, traefik_service_response_size_bytes_bucket{encoding="br"})
histogram_quantile(0.5, traefik_service_response_size_bytes_bucket{encoding="zstd"})
histogram_quantile(0.5, traefik_service_response_size_bytes_bucket{encoding="gzip"})

# Compression CPU overhead
rate(traefik_service_compression_duration_seconds_sum[5m]) / rate(traefik_service_compression_duration_seconds_count[5m])
```

---
## 9. Browser Cache Headers (complementary)

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: browser-cache
  namespace: traefik
spec:
  headers:
    customResponseHeaders:
      # Static assets - 1 year with immutable
      Cache-Control: "public, max-age=31536000, immutable"
      Vary: "Accept-Encoding"
    # Remove ETag for better caching (use Content-Hash instead)
    # etag: false
---