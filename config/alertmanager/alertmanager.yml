# Alertmanager Configuration
# Routes alerts from Prometheus to receivers
# Requires: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID in .env

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
      continue: true
    - match:
        severity: warning
      receiver: 'telegram'
      group_interval: 1h
      repeat_interval: 24h

receivers:
  - name: 'telegram'
    telegram_configs:
      - api_url: "https://api.telegram.org"
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        message: |
          {{ range .Alerts }}
          *{{ .Labels.alertname }}* ({{ .Labels.severity }})
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Job: {{ .Labels.job }}
          {{ end }}
        parse_mode: "Markdown"

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']