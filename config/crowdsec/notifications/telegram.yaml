# CrowdSec Telegram Notification Configuration
# Place in /etc/crowdsec/notifications/telegram.yaml
# Documentation: https://docs.crowdsec.net/docs/next/notifications/telegram/

name: telegram_notification
type: telegram
log_level: info

format: |
  {{ range .Alerts }}
  <b>🚨 CrowdSec Alert</b>
  <b>Scenario:</b> {{ .Scenario }}
  <b>Source IP:</b> {{ .Source.Value }}
  <b>Country:</b> {{ .Source.GetMeta "country" }}
  <b>ASN:</b> {{ .Source.GetMeta "asn" }}
  <b>Events:</b> {{ .EventsCount }}
  <b>Start:</b> {{ .StartAt.Format "2006-01-02 15:04:05" }}
  <b>Stop:</b> {{ .StopAt.Format "2006-01-02 15:04:05" }}
  {{ end }}

bot_token: "{{ env "TELEGRAM_BOT_TOKEN" }}"
chat_id: "{{ env "TELEGRAM_CHAT_ID" }}"