apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-network-policy
  labels:
    app.kubernetes.io/name: kyverno
    policy-type: operational
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-network-policy
      match:
        any:
          - resources:
              kinds:
                - Namespace
      validate:
        message: "Namespace must have at least one NetworkPolicy for zero-trust networking"
        deny:
          conditions:
            - key: "{{ request.object.metadata.name }}"
              operator: NotIn
              value: ["kube-system", "kyverno", "cert-manager", "argocd", "longhorn-system"]
            - key: "{{ networkPoliciesCount }}"
              operator: LessThan
              value: 1
      context:
        - name: networkPoliciesCount
          apiCall:
            urlPath: /apis/networking.k8s.io/v1/namespaces/{{ request.object.metadata.name }}/networkpolicies
            jmesPath: "items | length(@)"