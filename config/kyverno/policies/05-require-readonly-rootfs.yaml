apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  labels:
    app.kubernetes.io/name: kyverno
    policy-type: pod-security
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
      validate:
        message: "Containers must have readOnlyRootFilesystem: true"
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                - key: "{{ element.securityContext.readOnlyRootFilesystem }}"
                  operator: NotEquals
                  value: true
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                - key: "{{ element.securityContext.readOnlyRootFilesystem }}"
                  operator: NotEquals
                  value: true
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - cert-manager
                - argocd
                - longhorn-system