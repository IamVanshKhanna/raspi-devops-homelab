apiVersion: v1
kind: Pod
metadata:
  name: valid-pod
  labels:
    app: test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
  - name: test
    image: nginx@sha256:abc123
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      privileged: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"