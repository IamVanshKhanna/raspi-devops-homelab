# PDB Template: Critical Control Plane
# Usage: Apply per namespace with matching labels
# sed 's/NAMESPACE/<namespace>/g; s/APP_LABEL/<app-label>/g' | kubectl apply -f -

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-critical-controlplane
  namespace: NAMESPACE
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app.kubernetes.io/component: control-plane

---
# PDB Template: Stateful Workloads (1 replica minimum)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-stateful-workload
  namespace: NAMESPACE
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: stateful

---
# PDB Template: Standard Deployment (50% available)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-standard-deployment
  namespace: NAMESPACE
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app.kubernetes.io/component: standard

---
# PDB Template: Spot-tolerant Workloads (allow full disruption)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-spot-tolerant
  namespace: NAMESPACE
spec:
  maxUnavailable: 100%
  selector:
    matchLabels:
      lifecycle: spot