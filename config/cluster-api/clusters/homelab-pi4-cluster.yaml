apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: homelab-pi4
  namespace: homelab-clusters
  labels:
    homelab.io/environment: production
    homelab.io/hardware: pi4
    homelab.io/region: local
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.96.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  controlPlaneRef:
    kind: KubeadmControlPlane
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    name: homelab-pi4-cp
  infrastructureRef:
    kind: DockerCluster
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    name: homelab-pi4
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: homelab-pi4-cp
  namespace: homelab-clusters
spec:
  replicas: 1
  version: v1.28.5
  machineTemplate:
    infrastructureRef:
      kind: DockerMachineTemplate
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      name: homelab-pi4-cp
  kubeadmConfigSpec:
    clusterConfiguration:
      controllerManager:
        extraArgs:
          node-cidr-mask-size: "24"
      apiServer:
        extraArgs:
          default-not-ready-toleration-seconds: "30"
          default-unreachable-toleration-seconds: "30"
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          max-pods: "110"
          eviction-hard: "memory.available<500Mi,nodefs.available<10%"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          max-pods: "110"
          eviction-hard: "memory.available<500Mi,nodefs.available<10%"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerCluster
metadata:
  name: homelab-pi4
  namespace: homelab-clusters
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerMachineTemplate
metadata:
  name: homelab-pi4-cp
  namespace: homelab-clusters
spec:
  template:
    spec:
      extraMounts:
        - containerPath: /var/run/docker.sock
          hostPath: /var/run/docker.sock
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: homelab-pi4-md-0
  namespace: homelab-clusters
spec:
  clusterName: homelab-pi4
  replicas: 2
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab-pi4
  template:
    spec:
      clusterName: homelab-pi4
      version: v1.28.5
      bootstrap:
        configRef:
          kind: KubeadmConfigTemplate
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          name: homelab-pi4-md-0
      infrastructureRef:
        kind: DockerMachineTemplate
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        name: homelab-pi4-md-0
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: homelab-pi4-md-0
  namespace: homelab-clusters
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            max-pods: "110"
            eviction-hard: "memory.available<500Mi,nodefs.available<10%"
      files:
        - path: /etc/sysctl.d/99-kubernetes.conf
          content: |
            net.bridge.bridge-nf-call-iptables = 1
            net.ipv4.ip_forward = 1
            vm.max_map_count = 262144
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerMachineTemplate
metadata:
  name: homelab-pi4-md-0
  namespace: homelab-clusters
spec:
  template:
    spec:
      extraMounts:
        - containerPath: /var/run/docker.sock
          hostPath: /var/run/docker.sock