apiVersion: v1
kind: Pod
metadata:
  name: no-resources-pod
spec:
  containers:
  - name: test
    image: nginx@sha256:abc123
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      privileged: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault