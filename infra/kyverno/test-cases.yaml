# Kuttl Test Suite for Kyverno Policies

## Test Cases

### 1. Valid Pod Should Pass
```yaml
apiVersion: v1
kind: Pod
metadata:
  name: valid-pod
  labels:
    app: test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
  - name: test
    image: nginx@sha256:abc123
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      privileged: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
```

### 2. Privileged Pod Should Be Rejected
```yaml
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
spec:
  containers:
  - name: test
    image: nginx@sha256:abc123
    securityContext:
      privileged: true
```

### 3. Latest Tag Should Be Rejected
```yaml
apiVersion: v1
kind: Pod
metadata:
  name: latest-tag-pod
spec:
  containers:
  - name: test
    image: nginx:latest
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      privileged: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
```

### 4. Missing Resources Should Be Rejected
```yaml
apiVersion: v1
kind: Pod
metadata:
  name: no-resources-pod
spec:
  containers:
  - name: test
    image: nginx@sha256:abc123
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      privileged: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
```

### 5. Kustomize Test
```yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - overlays/test
```

## Running Tests

```bash
# Install Kuttl
curl -L https://github.com/kudobuilder/kuttl/releases/download/v0.11.1/kuttl-cli-linux-amd64.tar.gz | tar xz
sudo mv kubectl-kuttl /usr/local/bin/

# Run tests
kubectl kuttl test --config config/kyverno/kuttl-test.yaml --start-kind
```