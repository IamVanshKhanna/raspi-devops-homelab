apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: helm-release-validation
  annotations:
    policies.kyverno.io/title: "Helm Release Validation"
    policies.kyverno.io/category: "Deployment Safety"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-helm-release-annotations
      match:
        any:
        - resources:
            kinds:
              - HelmRelease
      validate:
        message: "HelmReleases must have required metadata"
        pattern:
          metadata:
            annotations:
              meta.helm.sh/release-name: "?*"
              meta.helm.sh/release-namespace: "?*"
    - name: require-helm-release-values
      match:
        any:
        - resources:
            kinds:
              - HelmRelease
      validate:
        message: "HelmReleases must specify values"
        pattern:
          spec:
            values: "?*"