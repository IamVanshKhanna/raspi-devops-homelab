apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  labels:
    app.kubernetes.io/name: kyverno
    policy-type: pod-security
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
      validate:
        message: "CPU and memory limits and requests are required for all containers"
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.resources.limits.cpu }}"
                    operator: NotEquals
                    value: ""
                  - key: "{{ element.resources.limits.memory }}"
                    operator: NotEquals
                    value: ""
                  - key: "{{ element.resources.requests.cpu }}"
                    operator: NotEquals
                    value: ""
                  - key: "{{ element.resources.requests.memory }}"
                    operator: NotEquals
                    value: ""
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - cert-manager
                - argocd