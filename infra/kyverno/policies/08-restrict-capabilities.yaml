apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-capabilities
  labels:
    app.kubernetes.io/name: kyverno
    policy-type: pod-security
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
      validate:
        message: "Containers must drop ALL capabilities and only add required ones"
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.capabilities.drop }}"
                    operator: NotEquals
                    value: "[\"ALL\"]"
                  - key: "{{ element.securityContext.capabilities.add }}"
                    operator: NotEquals
                    value: ""
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.capabilities.drop }}"
                    operator: NotEquals
                    value: "[\"ALL\"]"
                  - key: "{{ element.securityContext.capabilities.add }}"
                    operator: NotEquals
                    value: ""
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - cert-manager
                - argocd
                - longhorn-system
                - monitoring
                - logging