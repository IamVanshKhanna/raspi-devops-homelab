apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litmus
  namespace: argocd
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: chaos-engineering
spec:
  project: homelab
  source:
    repoURL: https://github.com/IamVanshKhanna/homelab-prod.git
    targetRevision: HEAD
    path: config/litmus
  destination:
    server: https://kubernetes.default.svc
    namespace: litmus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m