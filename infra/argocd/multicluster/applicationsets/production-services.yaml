apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: production-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/IamVanshKhanna/homelab-prod.git
        revision: HEAD
        directories:
          - path: config/argocd/services/production/*
  template:
    metadata:
      name: 'prod-{{path.basename}}'
      labels:
        homelab.io/tier: production
      annotations:
        argocd.argoproj.io/sync-wave: "30"
    spec:
      project: homelab
      source:
        repoURL: https://github.com/IamVanshKhanna/homelab-prod.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      syncWindows:
        - kind: schedule
          schedule: '0 2 * * 0'
          duration: 4h
          namespaces:
            - '*'