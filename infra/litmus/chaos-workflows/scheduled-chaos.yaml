apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: scheduled-chaos-workflow
  namespace: argocd
spec:
  entrypoint: chaos-workflow
  templates:
    - name: chaos-workflow
      steps:
        - - name: pod-delete
            template: run-chaos-experiment
            arguments:
              parameters:
                - name: experiment
                  value: pod-delete
        - - name: pod-cpu-hog
            template: run-chaos-experiment
            arguments:
              parameters:
                - name: experiment
                  value: pod-cpu-hog
        - - name: pod-memory-hog
            template: run-chaos-experiment
            arguments:
              parameters:
                - name: experiment
                  value: pod-memory-hog

    - name: run-chaos-experiment
      inputs:
        parameters:
          - name: experiment
      container:
        image: litmuschaos/litmus-checker:latest
        command: [sh, -c]
        args:
          - |
            echo "Running chaos experiment: {{inputs.parameters.experiment}}"
            kubectl apply -f /home/ubuntu_wsl/raspi-devops-homelab/config/litmus/chaos-experiments/{{inputs.parameters.experiment}}.yaml
            sleep 5
            kubectl wait --for=condition=Completed chaosengine/{{inputs.parameters.experiment}}-engine -n litmus --timeout=300s
            kubectl get chaosresult -n litmus -l chaosengine={{inputs.parameters.experiment}}-engine -o yaml

  labels:
    workflows.argoproj.io/create-time: "{{workflow.creationTimestamp}}"