apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: litmus-pod-network-latency-scheduled
  namespace: litmus
spec:
  templates:
    - name: pod-network-latency-chaos
      container:
        image: litmuschaos/litmus-checker:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            kubectl apply -f /experiments/pod-network-latency.yaml
            sleep 5
            kubectl wait --for=condition=Completed chaosengine/pod-network-latency -n litmus --timeout=300s
    - name: cleanup
      container:
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "-c"]
        args:
          - kubectl delete chaosengine pod-network-latency -n litmus --ignore-not-found=true
  entrypoint: pod-network-latency-chaos
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: pod-network-latency-weekly
  namespace: litmus
spec:
  schedule: "0 4 * * 4"  # Weekly on Thursday at 4 AM
  concurrencyPolicy: "Forbid"
  startingDeadlineSeconds: 300
  workflowSpec:
    workflowTemplateRef:
      name: litmus-pod-network-latency-scheduled