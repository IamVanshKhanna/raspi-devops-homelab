apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/component: monitoring
    policy-type: allow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []  # Allow external egress for Alertmanager webhooks (Telegram, etc.)
      ports:
        - protocol: TCP
          port: 443