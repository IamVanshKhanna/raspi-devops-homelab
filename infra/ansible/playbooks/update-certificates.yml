---
# Update certificates playbook - force cert-manager renewal
- name: Force certificate renewal via cert-manager
  hosts: control_plane[0]
  become: true
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    # Override via: ansible-playbook update-certificates.yml -e "namespace=apps cert_name=nextcloud-tls"
    namespace: "{{ namespace | default('') }}"
    cert_name: "{{ cert_name | default('') }}"
    force_all: "{{ force_all | default(false) }}"
  tasks:
    - name: Get certificates to renew
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get certificates {% if namespace %}-n {{ namespace }}{% else %}-A{% endif %} {% if cert_name %}{{ cert_name }}{% endif %} -o json
      register: certs_list
      changed_when: false

    - name: Parse certificates
      set_fact:
        certificates_to_renew: "{{ certs_list.stdout | from_json }}"

    - name: Display certificates
      debug:
        msg: "Found {{ certificates_to_renew.items | length }} certificate(s) to process"

    - name: Force renewal by deleting CertificateRequest
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} delete certificaterequest -l cert-manager.io/certificate-name={{ item.metadata.name }} -n {{ item.metadata.namespace }} --ignore-not-found=true
      loop: "{{ certificates_to_renew.items }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when: certificates_to_renew.items | length > 0

    - name: Force renewal by annotating Certificate
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} annotate certificate {{ item.metadata.name }} -n {{ item.metadata.namespace }} cert-manager.io/force-renewal={{ ansible_date_time.iso8601 }} --overwrite
      loop: "{{ certificates_to_renew.items }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when: certificates_to_renew.items | length > 0

    - name: Wait for certificates to be re-issued
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} wait --for=condition=Ready certificate {{ item.metadata.name }} -n {{ item.metadata.namespace }} --timeout=5m
      loop: "{{ certificates_to_renew.items }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when: certificates_to_renew.items | length > 0
      ignore_errors: true

    - name: Verify certificates renewed
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get certificates {% if namespace %}-n {{ namespace }}{% else %}-A{% endif %} {% if cert_name %}{{ cert_name }}{% endif %} -o json | jq -r '.items[] | "\(.metadata.namespace)/\(.metadata.name) \(.status.conditions[] | select(.type=="Ready") | .status) \(.status.notAfter)"'
      register: renewed_certs
      changed_when: false

    - name: Output certificate status
      debug:
        msg: "Certificate status after renewal:\n{{ renewed_certs.stdout }}"

    # Also trigger Traefik reload if ingress certificates changed
    - name: Check if ingress certificates were updated
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get certificates -A -o json | jq -r '.items[] | select(.spec.secretTemplate.labels."cert-manager.io/certificate-name") | select(.metadata.namespace=="traefik" or .spec.dnsNames[] | contains("homelab.local")) | .metadata.name'
      register: ingress_certs
      changed_when: false

    - name: Restart Traefik if ingress certs renewed
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} rollout restart deployment/traefik -n traefik && kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/traefik -n traefik --timeout=3m
      when: ingress_certs.stdout != ""
      ignore_errors: true