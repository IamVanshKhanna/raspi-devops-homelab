---
# Common role tasks
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - jq
      - git
      - vim
      - htop
      - net-tools
      - iproute2
      - dnsutils
      - nfs-common
      - open-iscsi
      - cryptsetup
      - socat
      - conntrack
      - ebtables
      - ethtool
    state: present
  when: ansible_os_family == "Debian"

- name: Enable and start open-iscsi
  systemd:
    name: iscsid
    enabled: true
    state: started
  when: ansible_os_family == "Debian"

- name: Configure kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay
    - nf_conntrack
    - nf_conntrack_netlink
  when: ansible_os_family == "Debian"

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      br_netfilter
      overlay
      nf_conntrack
      nf_conntrack_netlink
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Configure sysctl for Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward", value: "1" }
    - { key: "vm.max_map_count", value: "262144" }
    - { key: "fs.inotify.max_user_instances", value: "8192" }
    - { key: "fs.inotify.max_user_watches", value: "524288" }
    - { key: "fs.file-max", value: "1000000" }
  when: ansible_os_family == "Debian"

- name: Disable swap
  shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  when: ansible_swaptotal_mb > 0

- name: Set up ZRAM (2GB)
  block:
    - name: Install zram-tools
      apt:
        name: zram-tools
        state: present
      when: ansible_os_family == "Debian"

    - name: Configure ZRAM
      copy:
        dest: /etc/default/zramswap
        content: |
          # ZRAM configuration
          ALGO=zstd
          PERCENT=50
          PRIORITY=100
        mode: '0644'

    - name: Enable ZRAM
      systemd:
        name: zramswap
        enabled: true
        state: started

- name: Create homelab directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: vansh
    group: vansh
  loop:
    - /mnt/data
    - /mnt/backup
    - /home/vansh/homelab-prod
    - /home/vansh/.kube

- name: Set up Tailscale (if auth key provided)
  block:
    - name: Install Tailscale
      shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Start Tailscale
      shell: |
        tailscale up --authkey={{ vault_tailscale_authkey }} --hostname={{ inventory_hostname }} --accept-dns
      when: vault_tailscale_authkey is defined
      ignore_errors: true