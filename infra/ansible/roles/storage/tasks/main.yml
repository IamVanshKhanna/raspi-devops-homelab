---
# Storage role tasks
- name: Install Longhorn
  shell: |
    helm install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set defaultSettings.backupTarget=s3://homelab-backups@us-east-1 \
      --set defaultSettings.backupTargetCredentialSecret=longhorn-backup-credentials \
      --set defaultSettings.defaultReplicaCount=2 \
      --set defaultSettings.replicaSoftAntiAffinity=false \
      --wait --timeout=10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create Longhorn backup credentials secret
  shell: |
    kubectl create secret generic longhorn-backup-credentials \
      --namespace longhorn-system \
      --from-literal=AWS_ACCESS_KEY_ID="{{ vault_b2_account_id }}" \
      --from-literal=AWS_SECRET_ACCESS_KEY="{{ vault_b2_account_key }}" \
      --from-literal=AWS_ENDPOINTS="{{ vault_b2_endpoint }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Wait for Longhorn to be ready
  shell: |
    kubectl wait --for=condition=Available deployment/longhorn-driver-deployer -n longhorn-system --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install Postgres Operator (Patroni)
  shell: |
    helm install postgres-operator zalando/postgres-operator \
      --namespace postgres-system --create-namespace \
      --wait --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create databases namespace
  shell: |
    kubectl create namespace databases --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create PostgreSQL cluster
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: "acid.zalan.do/v1"
    kind: postgresql
    metadata:
      name: homelab-postgres
      namespace: databases
    spec:
      teamId: homelab
      volume:
        size: 20Gi
        storageClass: longhorn
      numberOfInstances: 3
      postgresql:
        version: "15"
      users:
        admin:
          - superuser
          - createdb
      databases:
        nextcloud: admin
        vaultwarden: admin
        authelia: admin
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install Redis Operator
  shell: |
    kubectl apply -f https://github.com/spotahome/redis-operator/releases/download/v1.1.0/redis-operator.yaml
    kubectl wait --for=condition=Ready deployment/redis-operator -n default --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create Redis cluster
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: databases.spotahome.com/v1
    kind: Redis
    metadata:
      name: homelab-redis
      namespace: databases
    spec:
      replicas: 3
      image: redis:7-alpine
      storageClassName: longhorn
      storageSize: 1Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server