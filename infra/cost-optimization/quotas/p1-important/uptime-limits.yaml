apiVersion: v1
kind: LimitRange
metadata:
  name: uptime-limits
  namespace: uptime
spec:
  limits:
  - type: Container
    default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    max:
      cpu: "1"
      memory: "2Gi"
    min:
      cpu: "10m"
      memory: "32Mi"
