# Kyverno values for homelab-prod

installValidationController: true
installBackgroundController: true
installCleanupController: true
installReportsController: true

replicaCount: 2

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Webhook configuration
webhooks:
  timeoutSeconds: 10
  failurePolicy: Fail
  sideEffects: None

# Enable CRD generation for policy reports
crds:
  generation: true

# Metrics
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s

# Policy configuration
policies:
  excludeNamespaces:
    - kube-system
    - kyverno
    - cert-manager
    - argocd

# Audit settings
audit:
  interval: 1h
  maxAuditResults: 1000

# Image verification (optional)
imageVerification:
  enabled: false