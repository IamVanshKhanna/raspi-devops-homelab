# Thanos Store Gateway values for management cluster

replicaCount: 2

dataDir: /data

objstore:
  config:
    type: S3
    config:
      bucket: homelab-thanos
      endpoint: s3.us-east-005.backblazeb2.com
      access_key: ${B2_KEY_ID}
      secret_key: ${B2_APP_KEY}

indexCacheSize: 256MB
chunkPoolSize: 256MB

httpAddress: 0.0.0.0:10902
grpcAddress: 0.0.0.0:10901

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

serviceMonitor:
  enabled: true
  namespace: monitoring