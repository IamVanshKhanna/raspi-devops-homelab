# Linkerd Control Plane values for homelab-prod

# High availability
controllerReplicas: 2

# Proxy defaults
proxy:
  cpu:
    request: 100m
    limit: 500m
  memory:
    request: 64Mi
    limit: 128Mi
  logging: info
  logLevel: info

# Identity (mTLS)
identity:
  trustDomain: homelab.local
  # External CA - comment out to use Linkerd-generated CA
  # trustAnchorsPEM: |-
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----

# Policy controller
policyController:
  enabled: false

# Destination service
destination:
  enabled: true

# Heartbeat
heartbeat:
  enabled: false

# Proxy injection
proxyInjector:
  enabled: true
  webhook:
    failurePolicy: Fail

# CSP for web
csp:
  enabled: true