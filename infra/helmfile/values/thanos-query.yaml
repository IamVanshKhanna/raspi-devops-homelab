# Thanos Query values for management cluster

replicaCount: 2

query:
  replicaLabel: "__replica__"
  autoDownsampling: true
  partialResponse: true

stores:
  - thanos-sidecar.monitoring:10901
  - thanos-store-gateway.monitoring:10901

httpAddress: 0.0.0.0:10902
grpcAddress: 0.0.0.0:10901

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

serviceMonitor:
  enabled: true
  namespace: monitoring