all:
  vars:
    ansible_user: vansh
    ansible_become: true
    ansible_become_method: sudo
    ansible_python_interpreter: /usr/bin/python3
    # Cluster configuration
    cluster_name: homelab-cluster
    cluster_domain: homelab.local
    # Paths
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    homelab_path: /home/vansh/homelab-prod
    # Monitoring
    prometheus_url: http://prometheus.monitoring.svc.cluster.local:9090
    grafana_url: http://grafana.monitoring.svc.cluster.local:3000
    loki_url: http://loki.logging.svc.cluster.local:3100
    tempo_url: http://tempo.tracing.svc.cluster.local:3200
    # Storage
    longhorn_namespace: longhorn-system
    # Network
    traefik_namespace: traefik
    metallb_namespace: metallb
  children:
    control_plane:
      hosts:
        node-1:
          ansible_host: 192.168.1.50
          node_role: control-plane
          k3s_server: true
          k3s_token: "{{ vault_k3s_token | default('') }}"
    workers:
      hosts:
        node-2:
          ansible_host: 192.168.1.51
          node_role: worker
          k3s_server: false
        node-3:
          ansible_host: 192.168.1.52
          node_role: worker
          k3s_server: false
    k3s_cluster:
      children:
        control_plane:
        workers:
    monitoring_stack:
      hosts:
        node-1:
    storage_nodes:
      hosts:
        node-1:
        node-2:
        node-3:
    traefik_nodes:
      hosts:
        node-1: