---
# Rotate secrets playbook - trigger secrets rotation via Infisical
- name: Rotate secrets in Infisical
  hosts: control_plane[0]
  become: true
  vars:
    homelab_path: /home/vansh/homelab-prod
    infisical_url: "{{ vault_infisical_url }}"
    infisical_project_id: "{{ vault_infisical_project_id }}"
    infisical_token: "{{ vault_infisical_token }}"
    rotation_days: "{{ rotation_days | default(90) }}"
    dry_run: "{{ dry_run | default(true) }}"
  tasks:
    - name: Check secrets-rotation.sh exists
      stat:
        path: "{{ homelab_path }}/scripts/secrets-rotation.sh"
      register: script_check

    - name: Fail if script missing
      fail:
        msg: "secrets-rotation.sh not found at {{ homelab_path }}/scripts/secrets-rotation.sh"
      when: not script_check.stat.exists

    - name: Run secrets rotation (dry-run)
      environment:
        INFISICAL_URL: "{{ infisical_url }}"
        INFISICAL_PROJECT_ID: "{{ infisical_project_id }}"
        INFISICAL_TOKEN: "{{ infisical_token }}"
        ROTATION_DAYS: "{{ rotation_days }}"
        DRY_RUN: "{{ 'true' if dry_run else 'false' }}"
      shell: |
        cd {{ homelab_path }} && ./scripts/secrets-rotation.sh
      register: rotation_result
      changed_when: "'Rotated' in rotation_result.stdout"
      ignore_errors: true

    - name: Output rotation result
      debug:
        msg: "Secrets rotation {{ 'DRY-RUN' if dry_run else 'EXECUTED' }} completed:\n{{ rotation_result.stdout }}"

    - name: Trigger workload reloads if actual rotation
      shell: |
        kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml rollout restart deployment -l infisical.secret --all-namespaces
      register: reload_result
      changed_when: false
      when: not dry_run
      ignore_errors: true

    - name: Verify workloads rolling
      shell: |
        kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml rollout status deployment -l infisical.secret --all-namespaces --timeout=5m
      register: rollout_status
      changed_when: false
      when: not dry_run
      ignore_errors: true