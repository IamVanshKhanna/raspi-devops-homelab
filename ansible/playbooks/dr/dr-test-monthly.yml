---
# Monthly DR Test Playbook - Test critical services without actual failover
- name: Monthly DR Test - Critical Services
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dr_kubeconfig: "/etc/rancher/k3s/k3s-dr.yaml"
    dr_namespace_prefix: "dr-test"
    velero_namespace: "velero"
    
  tasks:
    - name: Set DR test namespace
      shell: |
        echo "dr-test-$(date +%Y%m%d-%H%M%S)"
      register: dr_namespace
      changed_when: true

    - name: Check prerequisites
      block:
        - name: Check velero CLI
          command: velero version
          register: velero_check
          ignore_errors: true
          changed_when: false

        - name: Check kubectl
          command: kubectl version --client
          register: kubectl_check
          ignore_errors: true
          changed_when: false

        - name: Check DR kubeconfig exists
          stat:
            path: "{{ dr_kubeconfig }}"
          register: dr_kubeconfig_stat

        - name: Fail if DR kubeconfig missing
          fail:
            msg: "DR kubeconfig not found at {{ dr_kubeconfig }}"
          when: not dr_kubeconfig_stat.stat.exists

    - name: Create DR test namespace
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} create namespace {{ dr_namespace.stdout }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_create
      changed_when: false

    - name: Get latest Velero backup
      shell: |
        velero --kubeconfig={{ dr_kubeconfig }} backup get -o json 2>/dev/null | jq -r '.[0].metadata.name' 2>/dev/null || echo ""
      register: latest_backup
      changed_when: false

    - name: Fail if no backup found
      fail:
        msg: "No Velero backups found in DR cluster"
      when: latest_backup.stdout == "" or latest_backup.stdout == "null"

    - name: Display backup info
      debug:
        msg: "Using backup: {{ latest_backup.stdout }}"

    - name: Restore critical namespaces to test namespace
      shell: |
        velero --kubeconfig={{ dr_kubeconfig }} restore create \
          --from-backup {{ latest_backup.stdout }} \
          --namespace-mappings {{ item }}:{{ dr_namespace.stdout }} \
          --include-namespaces {{ item }} \
          --wait --timeout=300s 2>&1 | tail -5
      loop:
        - apps
        - databases
        - secrets
        - auth
        - monitoring
      loop_control:
        label: "{{ item }}"
      ignore_errors: true
      register: restores

    - name: Wait for pods to be ready
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} wait --for=condition=Ready pods --all -n {{ dr_namespace.stdout }} --timeout=300s 2>&1 || true
      register: pods_wait
      changed_when: false
      ignore_errors: true

    - name: Health check - Nextcloud
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/nextcloud -- curl -sf http://localhost:80/status.php >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_nextcloud
      changed_when: false
      ignore_errors: true

    - name: Health check - Vaultwarden
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/vaultwarden -- curl -sf http://localhost:80/alive >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_vaultwarden
      changed_when: false
      ignore_errors: true

    - name: Health check - PostgreSQL
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} statefulset/postgresql -- pg_isready -U admin >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_postgres
      changed_when: false
      ignore_errors: true

    - name: Health check - Redis
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} statefulset/redis -- redis-cli ping >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_redis
      changed_when: false
      ignore_errors: true

    - name: Health check - Authelia
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/authelia -- curl -sf http://localhost:9091/api/healthz >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_authelia
      changed_when: false
      ignore_errors: true

    - name: Health check - Infisical
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/infisical -- curl -sf http://localhost:8080/api/status >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_infisical
      changed_when: false
      ignore_errors: true

    - name: Health check - Prometheus
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/prometheus -- curl -sf http://localhost:9090/-/healthy >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_prometheus
      changed_when: false
      ignore_errors: true

    - name: Health check - Grafana
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} exec -n {{ dr_namespace.stdout }} deploy/grafana -- curl -sf http://localhost:3000/api/health >/dev/null 2>&1 && echo "PASS" || echo "FAIL"
      register: hc_grafana
      changed_when: false
      ignore_errors: true

    - name: Collect results
      set_fact:
        health_results:
          nextcloud: "{{ hc_nextcloud.stdout }}"
          vaultwarden: "{{ hc_vaultwarden.stdout }}"
          postgresql: "{{ hc_postgres.stdout }}"
          redis: "{{ hc_redis.stdout }}"
          authelia: "{{ hc_authelia.stdout }}"
          infisical: "{{ hc_infisical.stdout }}"
          prometheus: "{{ hc_prometheus.stdout }}"
          grafana: "{{ hc_grafana.stdout }}"

    - name: Display health check results
      debug:
        msg: "{{ item.key }}: {{ item.value }}"
      loop: "{{ health_results | dict2items }}"

    - name: Count failures
      set_fact:
        failed_count: "{{ health_results | dict2items | selectattr('value', 'equalto', 'FAIL') | list | length }}"

    - name: Display summary
      debug:
        msg: "Failed checks: {{ failed_count }} / {{ health_results | length }}"

    - name: Generate test report
      shell: |
        cat > /tmp/dr-test-report-$(date +%Y%m%d-%H%M%S).md <<EOF
        # Monthly DR Test Report
        
        **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
        **Test Namespace:** {{ dr_namespace.stdout }}
        **Backup Used:** {{ latest_backup.stdout }}
        
        ## Health Check Results
        {% for service, result in health_results.items() %}
        - {{ service }}: {{ result }}
        {% endfor %}
        
        ## Summary
        - Total Checks: {{ health_results | length }}
        - Passed: {{ health_results | length - failed_count }}
        - Failed: {{ failed_count }}
        - Overall: {% if failed_count == 0 %}PASS{% else %}PARTIAL{% endif %}
        
        ## Restore Details
        {% for restore in restores.results %}
        - {{ restore.item }}: {% if restore.rc == 0 %}SUCCESS{% else %}ISSUES{% endif %}
        {% endfor %}
        EOF
        cat /tmp/dr-test-report-$(date +%Y%m%d-%H%M%S).md
      register: test_report
      changed_when: true

    - name: Cleanup test namespace
      shell: |
        kubectl --kubeconfig={{ dr_kubeconfig }} delete namespace {{ dr_namespace.stdout }} --wait=false --ignore-not-found=true
      when: cleanup_after_test | default(true)
      ignore_errors: true

    - name: Send notification
      shell: |
        STATUS="{% if failed_count == 0 %}PASSED{% else %}PARTIAL{% endif %}"
        EMOJI="{% if failed_count == 0 %}✅{% else %}🟡{% endif %}"
        MESSAGE="${EMOJI} *Monthly DR Test ${STATUS}*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nFailed Checks: {{ failed_count }}\nNamespace: {{ dr_namespace.stdout }}"
        curl -sf -X POST "https://api.telegram.org/bot{{ vault_telegram_bot_token }}/sendMessage" \
          -d chat_id="{{ vault_telegram_chat_id }}" \
          -d text="${MESSAGE}" \
          -d parse_mode="Markdown" || true
      environment:
        vault_telegram_bot_token: "{{ vault_telegram_bot_token }}"
        vault_telegram_chat_id: "{{ vault_telegram_chat_id }}"
      ignore_errors: true