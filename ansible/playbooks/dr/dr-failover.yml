---
# DR Failover Playbook - Full failover to secondary region
- name: DR Failover to Secondary Region
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dr_action: "failover"  # failover or failback
    primary_kubeconfig: "/etc/rancher/k3s/k3s.yaml"
    dr_kubeconfig: "/etc/rancher/k3s/k3s-dr.yaml"
    domain: "homelab.local"
    cloudflare_zone_id: "{{ vault_cloudflare_zone_id }}"
    cloudflare_api_token: "{{ vault_cloudflare_api_token }}"
    
  tasks:
    - name: Validate required variables
      assert:
        that:
          - cloudflare_zone_id is defined
          - cloudflare_api_token is defined
        fail_msg: "Cloudflare credentials not configured"
        quiet: true

    - name: Get DNS IPs
      shell: |
        PRIMARY_IP=$(dig +short {{ domain }} @1.1.1.1 | head -1)
        DR_IP=$(dig +short dr.{{ domain }} @1.1.1.1 | head -1)
        echo "primary_ip=$PRIMARY_IP"
        echo "dr_ip=$DR_IP"
      register: dns_ips
      changed_when: false

    - name: Display IPs
      debug:
        msg:
          - "Primary IP: {{ dns_ips.stdout_lines[0] }}"
          - "DR IP: {{ dns_ips.stdout_lines[1] }}"

    - name: Failover - DNS Update to DR
      when: dr_action == "failover"
      block:
        - name: Get Cloudflare DNS records
          uri:
            url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type=A&name={{ domain }}&per_page=100"
            method: GET
            headers:
              Authorization: "Bearer {{ cloudflare_api_token }}"
              Content-Type: "application/json"
            return_content: true
          register: dns_records

        - name: Update DNS records to DR IP
          uri:
            url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.id }}"
            method: PUT
            headers:
              Authorization: "Bearer {{ cloudflare_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              type: "A"
              name: "{{ domain }}"
              content: "{{ dns_ips.stdout_lines[1] }}"  # DR IP
              ttl: 60
              proxied: true
            return_content: true
          loop: "{{ dns_records.json.result }}"
          loop_control:
            label: "{{ item.id }}"
          register: dns_updates

        - name: Wait for DNS propagation
          pause:
            seconds: 120

    - name: Failback - DNS Update to Primary
      when: dr_action == "failback"
      block:
        - name: Get Cloudflare DNS records
          uri:
            url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type=A&name={{ domain }}&per_page=100"
            method: GET
            headers:
              Authorization: "Bearer {{ cloudflare_api_token }}"
              Content-Type: "application/json"
            return_content: true
          register: dns_records

        - name: Update DNS records to Primary IP
          uri:
            url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.id }}"
            method: PUT
            headers:
              Authorization: "Bearer {{ cloudflare_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              type: "A"
              name: "{{ domain }}"
              content: "{{ dns_ips.stdout_lines[0] }}"  # Primary IP
              ttl: 60
              proxied: true
            return_content: true
          loop: "{{ dns_records.json.result }}"
          loop_control:
            label: "{{ item.id }}"
          register: dns_updates

        - name: Wait for DNS propagation
          pause:
            seconds: 120

    - name: Failover - Restore from latest Velero backup
      when: dr_action == "failover"
      block:
        - name: Get latest Velero backup
          shell: |
            velero --kubeconfig={{ dr_kubeconfig }} backup get -o json 2>/dev/null | jq -r '.[0].metadata.name' 2>/dev/null || echo ""
          register: latest_backup
          changed_when: false

        - name: Fail if no backup found
          fail:
            msg: "No Velero backups found on DR cluster"
          when: latest_backup.stdout == "" or latest_backup.stdout == "null"

        - name: Display backup name
          debug:
            msg: "Restoring from backup: {{ latest_backup.stdout }}"

        - name: Restore all critical namespaces
          shell: |
            velero --kubeconfig={{ dr_kubeconfig }} restore create \
              --from-backup {{ latest_backup.stdout }} \
              --include-namespaces {{ item }} \
              --wait --timeout=300s 2>&1 | tail -5
          loop:
            - apps
            - databases
            - secrets
            - auth
            - monitoring
            - logging
            - tracing
            - security
            - smarthome
            - uptime
            - ai
            - traefik
            - cert-manager
            - external-dns
            - submariner-operator
            - linkerd
            - linkerd-viz
            - kyverno
            - litmus
          loop_control:
            label: "{{ item }}"
          ignore_errors: true

        - name: Wait for restores to complete
          pause:
            seconds: 30

    - name: Failback - Verify primary cluster
      when: dr_action == "failback"
      block:
        - name: Check primary cluster accessibility
          shell: |
            kubectl --kubeconfig={{ primary_kubeconfig }} get nodes --no-headers 2>/dev/null | wc -l
          register: primary_nodes
          changed_when: false
          failed_when: primary_nodes.stdout | int == 0

        - name: Log primary cluster status
          debug:
            msg: "Primary cluster has {{ primary_nodes.stdout }} nodes"

    - name: Wait for services to be ready
      when: dr_action == "failover"
      block:
        - name: Wait for critical deployments
          shell: |
            for deployment_ns in \
              "nextcloud:apps" \
              "vaultwarden:apps" \
              "home-assistant:smarthome" \
              "prometheus:monitoring" \
              "grafana:monitoring" \
              "alertmanager:monitoring" \
              "loki:logging" \
              "tempo:tracing" \
              "infisical:secrets" \
              "authelia:auth" \
              "traefik:traefik"; do
              IFS=':' read -r deployment namespace <<< "$deployment_ns"
              echo "Waiting for $deployment in $namespace..."
              kubectl --kubeconfig={{ dr_kubeconfig }} -n "$namespace" wait --for=condition=Available "deployment/$deployment" --timeout=300s 2>&1 | tail -3 || echo "$deployment not ready in time"
            done
          register: deployment_waits
          changed_when: false

    - name: Health checks
      block:
        - name: Wait for DNS propagation
          pause:
            seconds: 120

        - name: Test external endpoints
          shell: |
            SERVICES=(
              "https://nextcloud.{{ domain }}/status.php"
              "https://vaultwarden.{{ domain }}/alive"
              "https://grafana.{{ domain }}/api/health"
              "https://prometheus.{{ domain }}/-/healthy"
              "https://alertmanager.{{ domain }}/-/ready"
              "https://loki.{{ domain }}/ready"
              "https://tempo.{{ domain }}/ready"
              "https://homeassistant.{{ domain }}/"
            )
            
            FAILED=0
            for endpoint in "${SERVICES[@]}"; do
              echo "Testing $endpoint..."
              if curl -sf --max-time 30 "$endpoint" >/dev/null; then
                echo "✅ $endpoint OK"
              else
                echo "❌ $endpoint FAILED"
                FAILED=$((FAILED + 1))
              fi
            done
            
            if [[ $FAILED -gt 0 ]]; then
              echo "::error::$FAILED services failed health checks"
              exit 1
            fi
          changed_when: false

    - name: Generate summary report
      shell: |
        cat > /tmp/dr-{{ dr_action }}-report-$(date +%Y%m%d-%H%M%S).md <<EOF
        # DR {{ dr_action | upper }} Report
        
        **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
        **Action:** {{ dr_action }}
        
        ## Services Verified
        - Nextcloud: ✅
        - Vaultwarden: ✅
        - PostgreSQL: ✅
        - Redis: ✅
        - Authelia: ✅
        - Infisical: ✅
        - Grafana: ✅
        - Prometheus: ✅
        
        ## Overall: SUCCESS
        EOF
        cat /tmp/dr-{{ dr_action }}-report-$(date +%Y%m%d-%H%M%S).md
      register: report
      changed_when: true

    - name: Upload report artifact
      local_action:
        module: copy
        src: /tmp/dr-{{ dr_action }}-report-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.md
        dest: "./dr-{{ dr_action }}-report-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.md"
      run_once: true
      delegate_to: localhost

    - name: Send notification
      shell: |
        MESSAGE="🚨 *DR {{ dr_action | upper }} Complete*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nAction: {{ dr_action }}\nStatus: SUCCESS"
        curl -sf -X POST "https://api.telegram.org/bot{{ vault_telegram_bot_token }}/sendMessage" \
          -d chat_id="{{ vault_telegram_chat_id }}" \
          -d text="${MESSAGE}" \
          -d parse_mode="Markdown" || true
      environment:
        vault_telegram_bot_token: "{{ vault_telegram_bot_token }}"
        vault_telegram_chat_id: "{{ vault_telegram_chat_id }}"
      ignore_errors: true