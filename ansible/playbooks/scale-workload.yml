---
# Scale workload playbook - scale deployment replicas
- name: Scale Kubernetes deployment
  hosts: control_plane[0]
  become: true
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    # Required vars (pass via -e):
    #   namespace: target namespace
    #   deployment: deployment name
    #   replicas: desired replica count
    # Optional:
    #   timeout: rollout timeout (default: 5m)
    namespace: "{{ namespace | mandatory }}"
    deployment: "{{ deployment | mandatory }}"
    replicas: "{{ replicas | mandatory | int }}"
    timeout: "{{ timeout | default('5m') }}"
  tasks:
    - name: Validate namespace exists
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get namespace {{ namespace }} --ignore-not-found
      register: ns_check
      changed_when: false
      failed_when: ns_check.rc != 0

    - name: Validate deployment exists
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get deployment {{ deployment }} -n {{ namespace }} --ignore-not-found
      register: deploy_check
      changed_when: false
      failed_when: deploy_check.rc != 0

    - name: Get current replica count
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get deployment {{ deployment }} -n {{ namespace }} -o jsonpath='{.spec.replicas}'
      register: current_replicas
      changed_when: false

    - name: Scale deployment
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} scale deployment {{ deployment }} -n {{ namespace }} --replicas={{ replicas }}
      register: scale_result
      changed_when: "'scaled' in scale_result.stdout"

    - name: Wait for rollout to complete
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/{{ deployment }} -n {{ namespace }} --timeout={{ timeout }}
      register: rollout_result
      changed_when: false
      ignore_errors: true

    - name: Verify new replica count
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get deployment {{ deployment }} -n {{ namespace }} -o jsonpath='{.spec.replicas}{" new "}{.status.readyReplicas}{" ready "}{.status.replicas}{" total"}'
      register: new_replicas
      changed_when: false

    - name: Output scaling result
      debug:
        msg: |
          Scaling completed:
          Namespace: {{ namespace }}
          Deployment: {{ deployment }}
          Previous replicas: {{ current_replicas.stdout }}
          New desired replicas: {{ replicas }}
          Current status: {{ new_replicas.stdout }}
          Rollout: {{ 'SUCCESS' if rollout_result.rc == 0 else 'FAILED/TIMEOUT' }}

    # Also handle HPA if present
    - name: Check for HPA
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} get hpa -n {{ namespace }} -l app.kubernetes.io/name={{ deployment }} --ignore-not-found -o name
      register: hpa_check
      changed_when: false

    - name: Update HPA minReplicas if scaling up
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} patch hpa -n {{ namespace }} -l app.kubernetes.io/name={{ deployment }} -p '{"spec":{"minReplicas":{{ replicas }}}}'
      when: hpa_check.stdout != "" and replicas > 1
      ignore_errors: true