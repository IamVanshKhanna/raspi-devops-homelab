---
# Backup playbook - runs restic backup
- name: Run restic backup
  hosts: control_plane[0]
  become: true
  vars:
    restic_repository: "{{ vault_restic_repository }}"
    restic_password: "{{ vault_restic_password }}"
    b2_account_id: "{{ vault_b2_account_id }}"
    b2_account_key: "{{ vault_b2_account_key }}"
    backup_paths:
      - /mnt/data
      - /etc/kubernetes
      - /home/vansh/homelab-prod
  tasks:
    - name: Check restic repository
      shell: |
        export RESTIC_REPOSITORY="{{ restic_repository }}"
        export RESTIC_PASSWORD="{{ restic_password }}"
        export B2_ACCOUNT_ID="{{ b2_account_id }}"
        export B2_ACCOUNT_KEY="{{ b2_account_key }}"
        restic snapshots --latest 1
      register: restic_check
      changed_when: false
      ignore_errors: true

    - name: Run backup
      shell: |
        export RESTIC_REPOSITORY="{{ restic_repository }}"
        export RESTIC_PASSWORD="{{ restic_password }}"
        export B2_ACCOUNT_ID="{{ b2_account_id }}"
        export B2_ACCOUNT_KEY="{{ b2_account_key }}"
        restic backup {% for path in backup_paths %} {{ path }} {% endfor %} \
          --tag "ansible-{{ ansible_date_time.iso8601 }}" \
          --tag "hostname-{{ inventory_hostname }}"
      register: backup_result
      changed_when: "'snapshot' in backup_result.stdout"

    - name: Verify backup
      shell: |
        export RESTIC_REPOSITORY="{{ restic_repository }}"
        export RESTIC_PASSWORD="{{ restic_password }}"
        export B2_ACCOUNT_ID="{{ b2_account_id }}"
        export B2_ACCOUNT_KEY="{{ b2_account_key }}"
        restic snapshots --latest 1 --json
      register: verify_result
      changed_when: false

    - name: Output backup info
      debug:
        msg: "Backup completed. Latest snapshot: {{ verify_result.stdout }}"
      when: verify_result.rc == 0

    # Prune old snapshots (keep last 30 daily, 12 monthly, 5 yearly)
    - name: Prune old snapshots
      shell: |
        export RESTIC_REPOSITORY="{{ restic_repository }}"
        export RESTIC_PASSWORD="{{ restic_password }}"
        export B2_ACCOUNT_ID="{{ b2_account_id }}"
        export B2_ACCOUNT_KEY="{{ b2_account_key }}"
        restic forget --keep-daily 30 --keep-monthly 12 --keep-yearly 5 --prune
      register: prune_result
      changed_when: "'removed' in prune_result.stdout"