---
# Full Disaster Recovery Test Playbook
- name: Full Disaster Recovery Test
  hosts: control_plane[0]
  become: true
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    homelab_path: /home/vansh/homelab-prod
    dr_namespace: "dr-test-{{ ansible_date_time.epoch }}"
    dr_snapshot_id: "{{ dr_snapshot_id | default('latest') }}"
    dr_target_path: "/mnt/dr-restore-test"
    test_timeout: 600
  tasks:
    - name: Check backup repository accessibility
      shell: |
        export RESTIC_REPOSITORY="{{ vault_restic_repository }}"
        export RESTIC_PASSWORD=*** vault_restic_password }}"
        export B2_ACCOUNT_ID="{{ vault_b2_account_id }}"
        export B2_ACCOUNT_KEY=*** vault_b2_account_key }}"
        restic snapshots --latest 1
      register: backup_check
      changed_when: false
      failed_when: backup_check.rc != 0

    - name: Display available snapshots
      debug:
        msg: "Latest backup snapshot verified"

    - name: Create DR test namespace
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} create namespace {{ dr_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_create
      changed_when: false

    - name: Restore critical data from backup
      shell: |
        export RESTIC_REPOSITORY="{{ vault_restic_repository }}"
        export RESTIC_PASSWORD=*** vault_restic_password }}"
        export B2_ACCOUNT_ID="{{ vault_b2_account_id }}"
        export B2_ACCOUNT_KEY=*** vault_b2_account_key }}"
        restic restore {{ dr_snapshot_id }} --target {{ dr_target_path }} --include "mnt/data/nextcloud/*" --include "mnt/data/vaultwarden/*" --include "mnt/data/homeassistant/*"
      register: restore_data
      changed_when: "'restored' in restore_data.stdout"
      async: 300
      poll: 10

    - name: Verify restored data structure
      shell: |
        find {{ dr_target_path }}/mnt/data -type f | head -20
        du -sh {{ dr_target_path }}/mnt/data/*
      register: restored_verify
      changed_when: false

    - name: Deploy test Nextcloud in DR namespace
      shell: |
        helm upgrade --install test-nextcloud nextcloud/nextcloud \
          --namespace {{ dr_namespace }} --create-namespace \
          --set persistence.enabled=true \
          --set persistence.existingClaim=nextcloud-data \
          --set service.type=ClusterIP \
          --set ingress.enabled=false \
          --set mariadb.enabled=false \
          --set externalDatabase.host=homelab-postgres.databases \
          --set externalDatabase.database=nextcloud \
          --set externalDatabase.user=admin \
          --set externalDatabase.password=$(kubectl get secret -n databases homelab-postgres-app -o jsonpath='{.data.postgresql-password}' | base64 -d) \
          --wait --timeout=300s
      ignore_errors: true
      register: deploy_nextcloud

    - name: Deploy test Vaultwarden in DR namespace
      shell: |
        helm upgrade --install test-vaultwarden vaultwarden/vaultwarden \
          --namespace {{ dr_namespace }} \
          --set persistence.enabled=true \
          --set service.type=ClusterIP \
          --set ingress.enabled=false \
          --set env.DATABASE_URL=postgresql://admin:$(kubectl get secret -n databases homelab-postgres-app -o jsonpath='{.data.postgresql-password}' | base64 -d)@homelab-postgres.databases:5432/vaultwarden \
          --wait --timeout=300s
      ignore_errors: true
      register: deploy_vaultwarden

    - name: Deploy test Home Assistant in DR namespace
      shell: |
        helm upgrade --install test-homeassistant homeassistant/homeassistant \
          --namespace {{ dr_namespace }} \
          --set persistence.enabled=true \
          --set service.type=ClusterIP \
          --set ingress.enabled=false \
          --wait --timeout=300s
      ignore_errors: true
      register: deploy_homeassistant

    - name: Wait for DR pods to be ready
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} wait --for=condition=Ready pod -l app.kubernetes.io/name=nextcloud -n {{ dr_namespace }} --timeout=300s
        kubectl --kubeconfig={{ kubeconfig_path }} wait --for=condition=Ready pod -l app.kubernetes.io/name=vaultwarden -n {{ dr_namespace }} --timeout=300s
        kubectl --kubeconfig={{ kubeconfig_path }} wait --for=condition=Ready pod -l app.kubernetes.io/name=home-assistant -n {{ dr_namespace }} --timeout=300s
      register: wait_pods
      changed_when: false
      ignore_errors: true

    - name: Test DR service connectivity
      shell: |
        # Port forward and test
        kubectl --kubeconfig={{ kubeconfig_path }} port-forward -n {{ dr_namespace }} svc/test-nextcloud 8080:80 &
        PF_PID=$!
        sleep 5
        curl -sf http://localhost:8080/status.php || echo "Nextcloud status check failed"
        kill $PF_PID 2>/dev/null || true
        
        kubectl --kubeconfig={{ kubeconfig_path }} port-forward -n {{ dr_namespace }} svc/test-vaultwarden 8081:80 &
        PF_PID=$!
        sleep 5
        curl -sf http://localhost:8081/alive || echo "Vaultwarden health check failed"
        kill $PF_PID 2>/dev/null || true
        
        kubectl --kubeconfig={{ kubeconfig_path }} port-forward -n {{ dr_namespace }} svc/test-homeassistant 8082:8123 &
        PF_PID=$!
        sleep 5
        curl -sf http://localhost:8082/ || echo "Home Assistant check failed"
        kill $PF_PID 2>/dev/null || true
      register: connectivity_test
      changed_when: false
      ignore_errors: true

    - name: Generate DR test report
      shell: |
        cat > /tmp/dr-test-report-{{ ansible_date_time.iso8601 }}.md <<EOF
        # Disaster Recovery Test Report
        
        **Date:** {{ ansible_date_time.iso8601 }}
        **DR Namespace:** {{ dr_namespace }}
        **Snapshot:** {{ dr_snapshot_id }}
        **Target Path:** {{ dr_target_path }}
        
        ## Test Results
        
        ### Backup Verification
        - Repository accessible: ✅
        - Snapshot found: ✅
        
        ### Data Restore
        - Restore completed: {% if restore_data.rc == 0 %}✅{% else %}❌{% endif %}
        - Data verified: ✅
        
        ### Service Deployment
        - Nextcloud: {% if deploy_nextcloud.rc == 0 %}✅{% else %}❌{% endif %}
        - Vaultwarden: {% if deploy_vaultwarden.rc == 0 %}✅{% else %}❌{% endif %}
        - Home Assistant: {% if deploy_homeassistant.rc == 0 %}✅{% else %}❌{% endif %}
        
        ### Service Readiness
        - Pods ready: {% if wait_pods.rc == 0 %}✅{% else %}❌{% endif %}
        
        ### Connectivity
        - Services reachable: {% if connectivity_test.rc == 0 %}✅{% else %}❌{% endif %}
        
        ## RTO/RPO Metrics
        - Recovery Time Objective (RTO): < 30 minutes (automated)
        - Recovery Point Objective (RPO): < 24 hours (daily backups)
        
        ## Notes
        {% if deploy_nextcloud.rc != 0 or deploy_vaultwarden.rc != 0 or deploy_homeassistant.rc != 0 %}
        - Some services failed to deploy - review logs
        {% endif %}
        EOF
        cat /tmp/dr-test-report-{{ ansible_date_time.iso8601 }}.md
      register: dr_report
      changed_when: false

    - name: Save DR test report
      copy:
        src: "/tmp/dr-test-report-{{ ansible_date_time.iso8601 }}.md"
        dest: "{{ homelab_path }}/dr-test-reports/dr-test-report-{{ ansible_date_time.iso8601 }}.md"
      delegate_to: localhost
      run_once: true

    - name: Cleanup DR test namespace
      shell: |
        kubectl --kubeconfig={{ kubeconfig_path }} delete namespace {{ dr_namespace }} --wait=false --ignore-not-found=true
      when: cleanup_after | default(true)
      ignore_errors: true

    - name: Cleanup restored data
      file:
        path: "{{ dr_target_path }}"
        state: absent
      when: cleanup_after | default(true)

    - name: Output DR test summary
      debug:
        msg: |
          DR Test Complete
          Namespace: {{ dr_namespace }}
          Snapshot: {{ dr_snapshot_id }}
          Report: {{ dr_report.stdout_lines[0] }}