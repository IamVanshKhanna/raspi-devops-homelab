---
# Monitoring role tasks
- name: Install Prometheus Stack
  shell: |
    helm install prometheus prometheus-community/kube-prometheus-stack \
      --namespace monitoring --create-namespace \
      --set prometheus.prometheusSpec.retention=30d \
      --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=longhorn \
      --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=10Gi \
      --set grafana.persistence.enabled=true \
      --set grafana.persistence.storageClassName=longhorn \
      --set grafana.persistence.size=5Gi \
      --wait --timeout=10m
  args:
    creates: /var/lib/prometheus
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install Loki Stack
  shell: |
    helm install loki grafana/loki-stack \
      --namespace logging --create-namespace \
      --set loki.persistence.enabled=true \
      --set loki.persistence.storageClassName=longhorn \
      --set loki.persistence.size=10Gi \
      --wait --timeout=10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install Tempo
  shell: |
    helm install tempo grafana/tempo \
      --namespace tracing --create-namespace \
      --set persistence.enabled=true \
      --set persistence.storageClassName=longhorn \
      --wait --timeout=10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install Cert-Manager
  shell: |
    helm install cert-manager jetstack/cert-manager \
      --namespace cert-manager --create-namespace \
      --version v1.13.0 \
      --set installCRDs=true \
      --wait --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create Let's Encrypt ClusterIssuer
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: {{ vault_acme_email }}
        privateKeySecretRef:
          name: letsencrypt-prod-key
        solvers:
        - dns01:
            cloudflare:
              apiTokenSecretRef:
                name: cloudflare-credentials
                key: api-token
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Create Cloudflare credentials secret
  shell: |
    kubectl create secret generic cloudflare-credentials \
      --namespace cert-manager \
      --from-literal=api-token="{{ vault_cloudflare_api_token }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server

- name: Install External-DNS
  shell: |
    kubectl create secret generic cloudflare-credentials \
      --namespace external-dns \
      --from-literal=api-token="{{ vault_cloudflare_api_token }}" \
      --dry-run=client -o yaml | kubectl apply -f -
    helm install external-dns external-dns/external-dns \
      --namespace external-dns --create-namespace \
      --set provider=cloudflare \
      --set env[0].name=CF_API_TOKEN \
      --set env[0].valueFrom.secretKeyRef.name=cloudflare-credentials \
      --set env[0].valueFrom.secretKeyRef.key=api-token \
      --wait --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_server