name: Unused Resource Detection

on:
  schedule:
    - cron: '0 7 * * 0'  # Weekly Sunday 7 AM
  workflow_dispatch:
    inputs:
      min_age:
        description: 'Minimum age in days to report'
        required: false
        default: '1'
        type: string
      output_format:
        description: 'Output format'
        required: false
        default: 'markdown'
        type: choice
        options:
          - json
          - csv
          - markdown

permissions:
  contents: read
  id-token: write

jobs:
  unused-resource-detection:
    name: Unused Resource Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run unused resource detection
        id: detection
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          python3 scripts/unused-resource-detector.py \
            --prometheus-url http://prometheus.monitoring.svc.cluster.local:9090 \
            --output unused-resources-report.md \
            --format ${{ github.event.inputs.output_format || 'markdown' }} \
            --min-age ${{ github.event.inputs.min_age || '1' }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: unused-resources-report
          path: unused-resources-report.md
          retention-days: 90

      - name: Check for unused resources
        id: check
        run: |
          # Count total unused resources
          if [[ -f unused-resources-report.md ]]; then
            COUNT=$(grep -c "^| " unused-resources-report.md || echo "0")
            echo "UNUSED_COUNT=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "UNUSED_COUNT=0" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue for Unused Resources
        if: steps.check.outputs.UNUSED_COUNT != '0' && steps.check.outputs.UNUSED_COUNT != ''
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly unused resources report"
          title: "Weekly Unused Resources Report"
          body: |
            ## Weekly Unused Resources Report
            
            **Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
            
            **Unused Resources Found:** ${{ steps.check.outputs.UNUSED_COUNT }}
            
            See attached artifact for detailed report with recommendations.
          branch: unused-resources-report-$(date +%Y%m%d)
          delete-branch: true
          labels: |
            automation
            cost-optimization
            unused-resources

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COUNT="${{ steps.check.outputs.UNUSED_COUNT }}"
          STATUS="${{ job.status }}"
          
          if [[ "${STATUS}" == "success" && "${COUNT}" != "0" ]]; then
            EMOJI="🗑️"
            MESSAGE="${EMOJI} *Unused Resources Found*\nCount: ${COUNT}\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          elif [[ "${STATUS}" == "success" && "${COUNT}" == "0" ]]; then
            EMOJI="✅"
            MESSAGE="${EMOJI} *No Unused Resources Found*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            EMOJI="❌"
            MESSAGE="${EMOJI} *Unused Resource Detection Failed*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" || true