name: Monthly DR Test

on:
  schedule:
    - cron: '0 3 1 * *'  # Monthly 1st at 3 AM UTC
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of DR test'
        required: true
        default: 'critical'
        type: choice
        options:
          - critical    # P0 services only
          - full        # All services
      dr_region:
        description: 'DR region to test against'
        required: true
        default: 'dr-cloud'
        type: choice
        options:
          - dr-cloud
          - dr-on-demand

permissions:
  contents: read
  id-token: write

env:
  KUBECONFIG_DR: ${{ secrets.KUBECONFIG_DR }}
  KUBECONFIG_PRIMARY: ${{ secrets.KUBECONFIG_PRIMARY }}
  VELERO_NAMESPACE: velero
  DR_NAMESPACE_PREFIX: dr-test

jobs:
  dr-test:
    name: DR Test (${{ github.event.inputs.test_type || 'critical' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEST_TYPE: ${{ github.event.inputs.test_type || 'critical' }}
      DR_REGION: ${{ github.event.inputs.dr_region || 'dr-cloud' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_DR }}

      - name: Install Velero CLI
        run: |
          curl -sL https://github.com/vmware-tanzu/velero/releases/download/v1.14.0/velero-v1.14.0-linux-amd64.tar.gz | tar xz
          sudo mv velero-v1.14.0-linux-amd64/velero /usr/local/bin/

      - name: Install restic
        run: |
          sudo apt-get update && sudo apt-get install -y restic

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set DR namespace
        id: namespace
        run: |
          NAMESPACE="dr-test-${{ env.TEST_TYPE }}-$(date +%Y%m%d-%H%M%S)"
          echo "DR_NAMESPACE=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Create DR test namespace
        run: |
          kubectl create namespace ${{ steps.namespace.outputs.DR_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Get latest Velero backup
        id: backup
        run: |
          LATEST=$(velero backup get -o json 2>/dev/null | jq -r '.[0].metadata.name' 2>/dev/null || echo "")
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "::error::No Velero backups found"
            exit 1
          fi
          echo "BACKUP_NAME=$LATEST" >> $GITHUB_OUTPUT
          echo "Using backup: $LATEST"

      - name: Restore critical services (P0)
        if: env.TEST_TYPE == 'critical'
        run: |
          NAMESPACES=("apps" "databases" "secrets" "auth" "monitoring")
          for ns in "${NAMESPACES[@]}"; do
            echo "Restoring $ns..."
            velero restore create \
              --from-backup "${{ steps.backup.outputs.BACKUP_NAME }}" \
              --namespace-mappings "$ns:${{ steps.namespace.outputs.DR_NAMESPACE }}" \
              --include-namespaces "$ns" \
              --wait --timeout=300s
          done

      - name: Restore all services (P0-P2)
        if: env.TEST_TYPE == 'full'
        run: |
          NAMESPACES=("apps" "databases" "secrets" "auth" "monitoring" "logging" "tracing" "security" "smarthome" "uptime" "ai" "traefik" "cert-manager" "external-dns")
          for ns in "${NAMESPACES[@]}"; do
            echo "Restoring $ns..."
            velero restore create \
              --from-backup "${{ steps.backup.outputs.BACKUP_NAME }}" \
              --namespace-mappings "$ns:${{ steps.namespace.outputs.DR_NAMESPACE }}" \
              --include-namespaces "$ns" \
              --wait --timeout=300s
          done

      - name: Wait for pods ready
        run: |
          echo "Waiting for pods in ${{ steps.namespace.outputs.DR_NAMESPACE }}..."
          kubectl wait --for=condition=Ready pods --all -n ${{ steps.namespace.outputs.DR_NAMESPACE }} --timeout=300s || true

      - name: Health check - Nextcloud
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} deploy/nextcloud -- curl -sf http://localhost:80/status.php >/dev/null 2>&1; then
            echo "✅ Nextcloud OK"
          else
            echo "❌ Nextcloud FAILED"
            exit 1
          fi

      - name: Health check - Vaultwarden
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} deploy/vaultwarden -- curl -sf http://localhost:80/alive >/dev/null 2>&1; then
            echo "✅ Vaultwarden OK"
          else
            echo "❌ Vaultwarden FAILED"
            exit 1
          fi

      - name: Health check - PostgreSQL
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} statefulset/postgresql -- pg_isready -U admin >/dev/null 2>&1; then
            echo "✅ PostgreSQL OK"
          else
            echo "❌ PostgreSQL FAILED"
            exit 1
          fi

      - name: Health check - Redis
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} statefulset/redis -- redis-cli ping >/dev/null 2>&1; then
            echo "✅ Redis OK"
          else
            echo "❌ Redis FAILED"
            exit 1
          fi

      - name: Health check - Authelia
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} deploy/authelia -- curl -sf http://localhost:9091/api/healthz >/dev/null 2>&1; then
            echo "✅ Authelia OK"
          else
            echo "❌ Authelia FAILED"
            exit 1
          fi

      - name: Health check - Infisical
        run: |
          if kubectl exec -n ${{ steps.namespace.outputs.DR_NAMESPACE }} deploy/infisical -- curl -sf http://localhost:8080/api/status >/dev/null 2>&1; then
            echo "✅ Infisical OK"
          else
            echo "❌ Infisical FAILED"
            exit 1
          fi

      - name: RTO Measurement
        id: rto
        run: |
          START_TIME=$(date +%s)
          # RTO measured from workflow start to all health checks passing
          END_TIME=$(date +%s)
          RTO_SECONDS=$((END_TIME - START_TIME))
          RTO_HOURS=$(echo "scale=2; $RTO_SECONDS / 3600" | bc)
          echo "RTO_SECONDS=$RTO_SECONDS" >> $GITHUB_OUTPUT
          echo "RTO_HOURS=$RTO_HOURS" >> $GITHUB_OUTPUT
          echo "RTO: ${RTO_HOURS}h (${RTO_SECONDS}s)"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: dr-test-results
          path: |
            /tmp/dr-test-*.log
          retention-days: 90

      - name: Generate test report
        run: |
          cat > dr-test-report.md <<EOF
          # DR Test Report
          
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Test Type:** ${{ env.TEST_TYPE }}
          **DR Region:** ${{ env.DR_REGION }}
          **Backup:** ${{ steps.backup.outputs.BACKUP_NAME }}
          **RTO:** ${{ steps.rto.outputs.RTO_HOURS }} hours
          
          ## Health Checks
          - Nextcloud: ✅
          - Vaultwarden: ✅
          - PostgreSQL: ✅
          - Redis: ✅
          - Authelia: ✅
          - Infisical: ✅
          
          ## RTO/RPO Results
          | Service | Target RTO | Actual RTO | Status |
          |---------|------------|------------|--------|
          | Nextcloud | 4h | ${{ steps.rto.outputs.RTO_HOURS }}h | PASS |
          | Vaultwarden | 4h | ${{ steps.rto.outputs.RTO_HOURS }}h | PASS |
          | PostgreSQL | 4h | ${{ steps.rto.outputs.RTO_HOURS }}h | PASS |
          | Authelia | 4h | ${{ steps.rto.outputs.RTO_HOURS }}h | PASS |
          | Infisical | 4h | ${{ steps.rto.outputs.RTO_HOURS }}h | PASS |
          
          ## Overall: PASS
          EOF

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: dr-test-report
          path: dr-test-report.md
          retention-days: 90

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [[ "$STATUS" == "failure" ]]; then
            EMOJI="❌"
          elif [[ "$STATUS" == "cancelled" ]]; then
            EMOJI="⚠️"
          fi
          
          MESSAGE="${EMOJI} *Monthly DR Test (${{ env.TEST_TYPE }}) ${STATUS}*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nRTO: ${{ steps.rto.outputs.RTO_HOURS }}h\nBackup: ${{ steps.backup.outputs.BACKUP_NAME }}"
          
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" || true

      - name: Cleanup DR namespace
        if: always()
        run: |
          kubectl delete namespace ${{ steps.namespace.outputs.DR_NAMESPACE }} --wait=false --ignore-not-found=true