name: Incident Response Drill

on:
  schedule:
    - cron: '0 4 1 * *'  # Monthly 1st at 4 AM
  workflow_dispatch:
    inputs:
      drill_type:
        description: 'Drill to run (all, database, redis, ingress, storage, cert, backup, network, oom)'
        required: false
        default: 'all'

permissions:
  contents: read
  id-token: write

jobs:
  incident-drill:
    name: Run Incident Response Drill
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
      
      - name: Run incident response drill
        id: drill
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/drills/incident-response-drill.sh
          if [ "${{ github.event.inputs.drill_type }}" = "all" ]; then
            ./scripts/drills/incident-response-drill.sh
          else
            ./scripts/drills/incident-response-drill.sh --drill ${{ github.event.inputs.drill_type }}
          fi
        continue-on-error: true
      
      - name: Upload drill logs
        uses: actions/upload-artifact@v4
        with:
          name: incident-drill-logs
          path: /var/log/incident-drill-*.log
          retention-days: 90
      
      - name: Report drill results
        if: always()
        run: |
          DRILL_LOG=$(ls -t /var/log/incident-drill-*.log 2>/dev/null | head -1)
          if [ -f "$DRILL_LOG" ]; then
            echo "=== Drill Log Summary ==="
            tail -30 "$DRILL_LOG"
          fi
      
      - name: Send results to Telegram
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRILL_LOG=$(ls -t /var/log/incident-drill-*.log 2>/dev/null | head -1)
          if [ -f "$DRILL_LOG" ]; then
            PASSED=$(grep -c "PASS" "$DRILL_LOG" || echo 0)
            FAILED=$(grep -c "FAIL" "$DRILL_LOG" || echo 0)
            
            case ${{ job.status }} in
              success) EMOJI="✅" STATUS="PASSED" ;;
              failure) EMOJI="❌" STATUS="FAILED" ;;
              *) EMOJI="🟡" STATUS="PARTIAL" ;;
            esac
            
            MESSAGE="${EMOJI} *Incident Response Drill ${STATUS}*\nDrills Passed: $PASSED\nDrills Failed: $FAILED\nWorkflow: ${{ github.workflow }} #${{ github.run_number }}"
            
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MESSAGE}" \
              -d parse_mode="Markdown" || true