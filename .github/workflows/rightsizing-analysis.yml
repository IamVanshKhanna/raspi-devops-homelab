name: Right-Sizing Analysis

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM
  workflow_dispatch:
    inputs:
      min_savings:
        description: 'Minimum savings % to report'
        required: false
        default: '10'
        type: string
      output_format:
        description: 'Output format'
        required: false
        default: 'markdown'
        type: choice
        options:
          - json
          - csv
          - markdown

permissions:
  contents: read
  id-token: write

jobs:
  rightsizing-analysis:
    name: Right-Sizing Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run right-sizing analysis
        id: analysis
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          python3 scripts/rightsizing-analyzer.py \
            --prometheus-url http://prometheus.monitoring.svc.cluster.local:9090 \
            --output rightsizing-report.md \
            --format ${{ github.event.inputs.output_format || 'markdown' }} \
            --min-savings ${{ github.event.inputs.min_savings || '10' }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: rightsizing-report
          path: rightsizing-report.md
          retention-days: 90

      - name: Create PR with recommendations
        if: always() && github.event_name != 'schedule' || github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly right-sizing recommendations"
          title: "Weekly Right-Sizing Recommendations"
          body: |
            ## Weekly Right-Sizing Recommendations
            
            Automated analysis of container resource usage vs requests/limits.
            
            **Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
            **Source:** Prometheus metrics + VPA recommendations
            
            See attached artifact for detailed report.
          branch: rightsizing-recommendations-$(date +%Y%m%d)
          delete-branch: true
          labels: |
            automation
            cost-optimization
            rightsizing

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [[ "$STATUS" == "success" ]]; then
            EMOJI="📊"
            MESSAGE="${EMOJI} *Weekly Right-Sizing Analysis Complete*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nReport: ${ARTIFACT_URL}"
          else
            EMOJI="❌"
            MESSAGE="${EMOJI} *Right-Sizing Analysis Failed*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nCheck workflow: ${ARTIFACT_URL}"
          fi
          
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" || true