name: Backup Test

on:
  schedule:
    - cron: '0 5 * * 0'  # Weekly Sunday 5 AM (after backup)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-test:
    name: Backup Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install restic
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Verify backup script exists
        run: test -f scripts/backup.sh && test -x scripts/backup.sh

      - name: Check restic configuration
        env:
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_ACCOUNT_KEY: ${{ secrets.B2_ACCOUNT_KEY }}
        run: |
          if [ -n "$RESTIC_REPOSITORY" ]; then
            echo "Backup configuration present"
          else
            echo "Backup secrets not configured in repo settings"
            exit 1
          fi

      - name: Test repository access
        env:
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_ACCOUNT_KEY: ${{ secrets.B2_ACCOUNT_KEY }}
        run: |
          restic snapshots --latest 1 | grep -q "snapshot" || {
            echo "ERROR: No recent snapshot found"
            exit 1
          }
          echo "Recent snapshot found"

      - name: Test restore (sample)
        env:
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_ACCOUNT_KEY: ${{ secrets.B2_ACCOUNT_KEY }}
        run: |
          SNAPSHOT_ID=$(restic snapshots --latest 1 --json | jq -r '.[0].short_id')
          echo "Testing restore of snapshot: $SNAPSHOT_ID"
          restic restore "$SNAPSHOT_ID" --target /tmp/restore-test --include "*.md" --include "Makefile"
          test -f /tmp/restore-test/README.md && echo "Restore test PASSED" || {
            echo "Restore test FAILED"
            exit 1
          }
          rm -rf /tmp/restore-test
          echo "Backup restore verification PASSED"