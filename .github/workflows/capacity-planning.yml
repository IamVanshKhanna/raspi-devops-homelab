name: Capacity Planning

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      prometheus_url:
        description: 'Prometheus URL'
        required: false
        default: 'http://prometheus.monitoring.svc.cluster.local:9090'

permissions:
  contents: read
  id-token: write

jobs:
  capacity-plan:
    name: Run Capacity Planning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run capacity planning
        id: capacity
        env:
          PROMETHEUS_URL: ${{ github.event.inputs.prometheus_url || 'http://prometheus.monitoring.svc.cluster.local:9090' }}
          OUTPUT_DIR: ${{ runner.temp }}/capacity-reports
        run: |
          python3 scripts/capacity-plan.py --json --output-dir "$OUTPUT_DIR"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: capacity-report
          path: ${{ runner.temp }}/capacity-reports/
          retention-days: 90
      - name: Check for critical alerts
        if: steps.capacity.outcome == 'success'
        run: |
          REPORT=$(cat ${{ runner.temp }}/capacity-reports/capacity_report_latest.json)
          CRITICAL_ALERTS=$(echo "$REPORT" | jq '[.alerts[] | select(.level == "critical")] | length')
          WARNING_ALERTS=$(echo "$REPORT" | jq '[.alerts[] | select(.level == "warning")] | length')
          echo "Critical alerts: $CRITICAL_ALERTS"
          echo "Warning alerts: $WARNING_ALERTS"
          if [ "$CRITICAL_ALERTS" -gt 0 ]; then
            echo "::error::Critical capacity alerts detected!"
            echo "$REPORT" | jq '.alerts[] | select(.level == "critical")' | jq -r '"\(.metric): \(.value) (threshold: \(.threshold))"'
            exit 1
          elif [ "$WARNING_ALERTS" -gt 0 ]; then
            echo "::warning::Capacity warnings detected"
            echo "$REPORT" | jq '.alerts[] | select(.level == "warning")' | jq -r '"\(.metric): \(.value) (threshold: \(.threshold))"'
          fi
      - name: Send Telegram notification
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPORT_FILE="${{ runner.temp }}/capacity-reports/capacity_report_latest.json"
          if [ -f "$REPORT_FILE" ]; then
            DISK_USAGE=$(jq -r '.current_metrics.disk_usage_pct.formatted // "N/A"' "$REPORT_FILE")
            MEM_USAGE=$(jq -r '.current_metrics.memory_usage_pct.formatted // "N/A"' "$REPORT_FILE")
            CPU_USAGE=$(jq -r '.current_metrics.cpu_usage_pct.formatted // "N/A"' "$REPORT_FILE")
            DISK_EXHAUSTION=$(jq -r '.disk_exhaustion_estimate // "Unknown"' "$REPORT_FILE")
            ALERTS=$(jq -r '.alerts | length' "$REPORT_FILE")
            case ${{ job.status }} in
              success) EMOJI="✅" ;;
              failure) EMOJI="🔴" ;;
              *) EMOJI="🟡" ;;
            esac
            MESSAGE="${EMOJI} *Weekly Capacity Report*\n*Disk:* $DISK_USAGE\n*Memory:* $MEM_USAGE\n*CPU:* $CPU_USAGE\n*Disk Exhaustion:* $DISK_EXHAUSTION\n*Alerts:* $ALERTS\n*Workflow:* ${{ github.workflow }} #${{ github.run_number }}"
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MESSAGE}" \
              -d parse_mode="Markdown" || true