name: Secrets Rotation

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM
  workflow_dispatch:
    inputs:
      execute_rotation:
        description: 'Run actual rotation (not dry-run)'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  secrets-rotation:
    name: Rotate Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/Infisical/infisical/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install kubectl
        run: |
          curl -sfL "https://dl.k8s.io/release/$(curl -sfL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl

      - name: Configure kubectl
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run secrets rotation (dry-run)
        if: ${{ github.event.inputs.execute_rotation != 'true' }}
        env:
          INFISICAL_URL: ${{ secrets.INFISICAL_URL }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          ROTATION_DAYS: ${{ secrets.ROTATION_DAYS }}
          DRY_RUN: "true"
        run: |
          chmod +x scripts/secrets-rotation.sh
          ./scripts/secrets-rotation.sh

      - name: Run secrets rotation (execute)
        if: ${{ github.event.inputs.execute_rotation == 'true' }}
        env:
          INFISICAL_URL: ${{ secrets.INFISICAL_URL }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          ROTATION_DAYS: ${{ secrets.ROTATION_DAYS }}
          DRY_RUN: "false"
        run: |
          chmod +x scripts/secrets-rotation.sh
          ./scripts/secrets-rotation.sh

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          EXECUTE_ROTATION: ${{ github.event.inputs.execute_rotation }}
        run: |
          if [[ -n "$TELEGRAM_BOT_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            if [[ "$JOB_STATUS" == "success" ]]; then
              if [[ "$EXECUTE_ROTATION" == "true" ]]; then
                MESSAGE="✅ Secrets rotation completed successfully (EXECUTED)"
              else
                MESSAGE="✅ Secrets rotation dry-run completed successfully"
              fi
            else
              if [[ "$EXECUTE_ROTATION" == "true" ]]; then
                MESSAGE="🚨 Secrets rotation FAILED (EXECUTED)"
              else
                MESSAGE="🚨 Secrets rotation dry-run FAILED"
              fi
            fi
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MESSAGE}" \
              -d parse_mode="Markdown" >/dev/null || true
          fi