name: Trivy Quick Scan

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 4 AM
  push:
    branches: [main, develop]
    paths:
      - 'stacks/**'
  workflow_dispatch:

jobs:
  trivy-quick:
    name: Quick Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Extract images from compose files
        id: images
        run: |
          IMAGES=$(grep -h "image:" stacks/**/docker-compose.yml 2>/dev/null | sed 's/.*image: *//' | sort -u)
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      - name: Quick scan (HIGH+CRITICAL only, fast)
        run: |
          for img in ${{ steps.images.outputs.images }}; do
            echo "Quick scanning $img..."
            trivy image --severity HIGH,CRITICAL --no-progress --format table "$img" || true
          done

      - name: Upload SARIF for HIGH+CRITICAL
        run: |
          for img in ${{ steps.images.outputs.images }}; do
            safe_name=$(echo "$img" | sed 's|[/:]|-|g')
            trivy image --severity HIGH,CRITICAL --format sarif --output "trivy-quick-${safe_name}.sarif" "$img" || true
          done

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-quick-*.sarif'
          category: trivy-quick