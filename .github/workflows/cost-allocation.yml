name: Cost Allocation Report

on:
  schedule:
    - cron: '0 5 * * 1'  # Weekly Monday 5 AM
  workflow_dispatch:
    inputs:
      output_format:
        description: 'Output format'
        required: false
        default: 'markdown'
        type: choice
        options:
          - json
          - csv
          - markdown

permissions:
  contents: read
  id-token: write

jobs:
  cost-allocation:
    name: Cost Allocation Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run cost allocation analysis
        id: analysis
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          python3 scripts/cost-allocation.py \
            --prometheus-url http://prometheus.monitoring.svc.cluster.local:9090 \
            --output cost-allocation-report.md \
            --format ${{ github.event.inputs.output_format || 'markdown' }} \
            --cpu-rate 30.0 \
            --memory-rate 4.0 \
            --storage-rate 0.10 \
            --lb-rate 22.0

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cost-allocation-report
          path: cost-allocation-report.md
          retention-days: 90

      - name: Create PR with cost allocation
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly cost allocation report"
          title: "Weekly Cost Allocation Report"
          body: |
            ## Weekly Cost Allocation Report
            
            **Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
            
            Automated cost allocation by namespace, team, and service based on Prometheus metrics.
            
            See attached artifact for detailed report.
          branch: cost-allocation-report-$(date +%Y%m%d)
          delete-branch: true
          labels: |
            automation
            cost-optimization
            chargeback

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          TOTAL_COST=$(grep "Total Monthly Cost" cost-allocation-report.md | grep -oE '\$[0-9.]+' | head -1 || echo "N/A")
          
          if [[ "${STATUS}" == "success" ]]; then
            EMOJI="💰"
            MESSAGE="${EMOJI} *Weekly Cost Allocation Report*\nTotal: ${TOTAL_COST}/month\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            EMOJI="❌"
            MESSAGE="${EMOJI} *Cost Allocation Report Failed*\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" || true