# STACK: CROWDSEC — Intrusion Detection
# https://docs.crowdsec.net/
# Deploy for log parsing and threat intelligence

version: "3.8"

networks:
  proxy:
    external: true

volumes:
  crowdsec_data:
  crowdsec_config:
  crowdsec_pgdata:

services:
  crowdsec:
    # Check latest: https://github.com/crowdsecurity/crowdsec/releases
    image: crowdsecurity/crowdsec:v1.6.0
    container_name: crowdsec
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - ../../config/crowdsec/notifications:/etc/crowdsec/notifications
      - /var/log:/var/log/host:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - TZ=${TZ}
      - CROWDSEC_AGENCY_KEY=${CROWDSEC_API_KEY:-}
    mem_limit: 256m
    cpus: 0.5
    cap_add:
      - NET_ADMIN
      - SYS_RESOURCE
    depends_on:
      - crowdsec-db

  crowdsec-db:
    image: postgres:15-alpine
    container_name: crowdsec-db
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - crowdsec_pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=crowdsec
      - POSTGRES_PASSWORD=${CROWDSEC_DB_PASSWORD}
      - POSTGRES_DB=crowdsec
    mem_limit: 128m
    cpus: 0.1