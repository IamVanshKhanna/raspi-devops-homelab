# Ollama Cluster Helm Values
# Usage: helm install ollama ./charts/ollama -f values.yaml -n ai

# Replica count
replicaCount: 3

# Image
image:
  repository: ollama/ollama
  tag: "0.3.14"
  pullPolicy: IfNotPresent

# Namespace
namespace: ai

# Image pull secrets (if using private registry)
imagePullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 11434
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

# Ingress configuration
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: ollama.homelab.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ollama-tls
      hosts:
        - ollama.homelab.local

# Resources
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi

# Autoscaling (HPA)
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

# Affinity and scheduling
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - ollama
          topologyKey: kubernetes.io/hostname

# Persistent volume for models
pvc:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteMany
  size: 50Gi
  annotations: {}

# Model pre-pulling
modelPuller:
  enabled: true
  models:
    - gemma:2b
    - llama3:8b
    - codellama:7b
    - mixtral:8x7b
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Configuration
config:
  host: "0.0.0.0"
  port: 11434
  num_parallel: 2
  max_loaded_models: 3
  flash_attention: true
  origins:
    - "*"
  log_level: info
  context_size: 4096

# Probe settings
livenessProbe:
  httpGet:
    path: /api/tags
    port: 11434
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/tags
    port: 11434
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Monitoring
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  metricsPath: /metrics
  port: http

# Prometheus rules
prometheusRules:
  enabled: true
  rules:
    - alert: OllamaDown
      expr: up{job="ollama"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Ollama instance {{ $labels.instance }} down"
        description: "Ollama has been down for more than 1 minute"

    - alert: OllamaHighMemoryUsage
      expr: (container_memory_usage_bytes{container="ollama"} / container_spec_memory_limit_bytes{container="ollama"}) > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Ollama {{ $labels.pod }} high memory usage"
        description: "Memory usage above 85%"

    - alert: OllamaHighCPUUsage
      expr: (rate(container_cpu_usage_seconds_total{container="ollama"}[5m]) * 100) > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Ollama {{ $labels.pod }} high CPU usage"
        description: "CPU usage above 80% for 10 minutes"

    - alert: OllamaNoModelsLoaded
      expr: ollama_loaded_models == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Ollama {{ $labels.pod }} has no models loaded"
        description: "No models currently loaded in memory"

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault