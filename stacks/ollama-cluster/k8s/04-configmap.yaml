apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: ai
data:
  ollama.yaml: |
    # Ollama Configuration
    # https://github.com/ollama/ollama/blob/main/docs/config.md
    
    # Host and port
    host: "0.0.0.0"
    port: 11434
    
    # Model management
    num_parallel: 2
    max_loaded_models: 3
    flash_attention: true
    
    # Model directory (mounted via PVC)
    models_dir: /root/.ollama
    
    # Origins for CORS
    origins:
      - "*"
    
    # Logging
    log_level: "info"
    
    # Performance
    flash_attention: true
    num_parallel: 2
    max_loaded_models: 3
    context_size: 4096