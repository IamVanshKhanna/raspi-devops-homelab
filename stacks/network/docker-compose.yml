# STACK: NETWORK
# Services: Pi-hole (DNS ad-blocking) + WireGuard (VPN)
# IMPORTANT: Disable systemd-resolved first:
#   sudo systemctl disable --now systemd-resolved

networks:
  proxy:
    external: true

volumes:
  pihole_data:
  pihole_dnsmasq:
  wireguard_data:

services:

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
      - ../../config/pihole/custom.list:/etc/pihole/custom.list:ro
    environment:
      - TZ=${TZ}
      - WEBPASSWORD=${PIHOLE_WEBPASSWORD}
      - PIHOLE_DNS_=${PIHOLE_DNS1};${PIHOLE_DNS2}
      - DNSMASQ_LISTENING=all
      - WEB_PORT=8053
    cap_add:
      - NET_ADMIN

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "51820:51820/udp"
    volumes:
      - wireguard_data:/config
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SERVERURL=${WG_HOST}
      - SERVERPORT=51820
      - PEERS=${WG_PEERS}
      - PEERDNS=${WG_DEFAULT_DNS}
      - ALLOWEDIPS=${WG_ALLOWED_IPS}
      - PERSISTENTKEEPALIVE_PEERS=all
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
