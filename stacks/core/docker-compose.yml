# STACK: CORE
# Services: Traefik (reverse proxy + TLS) + Portainer (Docker UI)
# Deploy FIRST before any other stack.

networks:
  proxy:
    external: true

volumes:
  portainer_data:
  traefik_certs:

services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../config/traefik/traefik.yml:/traefik.yml:ro
      - ../../config/traefik/dynamic.yml:/dynamic.yml:ro
      - traefik_certs:/certs
    environment:
      - TZ=${TZ}
      - ACME_EMAIL=${ACME_EMAIL}
    mem_limit: 128m
    cpus: 0.5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=basic-auth@file,secure-headers@file"

  portainer:
    # Pin to specific version - update manually after testing
    # Check latest: https://github.com/portainer/portainer/releases
    image: portainer/portainer-ce:2.21.0
    container_name: portainer
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    mem_limit: 256m
    cpus: 0.5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
