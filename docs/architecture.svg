<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .box { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 8; }
    .title { fill: #f0f6fc; font-size: 14px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-size: 11px; }
    .service { fill: #21262d; stroke: #30363d; stroke-width: 1; rx: 6; }
    .service-name { fill: #f0f6fc; font-size: 11px; font-weight: 500; }
    .service-port { fill: #8b949e; font-size: 9px; }
    .arrow { stroke: #58a6ff; stroke-width: 1.5; marker-end: url(#arrowhead); fill: none; }
    .label { fill: #58a6ff; font-size: 10px; font-weight: 500; }
    .network { fill: none; stroke: #388bfd; stroke-width: 2; stroke-dasharray: 5 5; rx: 8; }
    .wan { fill: #1f6feb; stroke: #1f6feb; rx: 6; }
    .wan-text { fill: white; font-size: 11px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="700"/>

  <!-- Internet / WAN -->
  <rect x="50" y="50" width="140" height="60" class="wan"/>
  <text x="120" y="85" text-anchor="middle" class="wan-text">INTERNET</text>
  <text x="120" y="100" text-anchor="middle" class="subtitle">443 / UDP 51820</text>

  <!-- Tailscale -->
  <rect x="220" y="50" width="140" height="60" class="wan" style="fill:#238636;stroke:#238636"/>
  <text x="290" y="85" text-anchor="middle" class="wan-text">TAILSCALE</text>
  <text x="290" y="100" text-anchor="middle" class="subtitle">MagicDNS / Exit Node</text>

  <!-- Traefik -->
  <rect x="450" y="50" width="300" height="120" class="box"/>
  <text x="600" y="75" text-anchor="middle" class="title">TRAEFIK v3.0.4</text>
  <text x="600" y="95" text-anchor="middle" class="subtitle">Reverse Proxy + TLS (Let's Encrypt)</text>
  <text x="500" y="115" class="service-port">:80  :443  :8080 (metrics)</text>
  <text x="500" y="135" class="service-port">traefik.DOMAIN  portainer.DOMAIN</text>
  <text x="500" y="150" class="service-port">grafana.DOMAIN  cloud.DOMAIN  vault.DOMAIN</text>

  <!-- Arrow: Internet -> Traefik -->
  <path d="M190 80 L450 80" class="arrow"/>
  <path d="M360 80 L450 80" class="arrow"/>

  <!-- Core Network (proxy) -->
  <rect x="440" y="190" width="320" height="320" class="network"/>
  <text x="600" y="210" text-anchor="middle" class="label">Docker Network: proxy</text>

  <!-- Core Services in proxy network -->
  <rect x="460" y="220" width="140" height="80" class="service"/>
  <text x="530" y="240" text-anchor="middle" class="service-name">PORTER</text>
  <text x="530" y="255" text-anchor="middle" class="subtitle">Portainer CE 2.21</text>
  <text x="530" y="270" text-anchor="middle" class="service-port">:9000 :9443</text>

  <rect x="620" y="220" width="140" height="80" class="service"/>
  <text x="690" y="240" text-anchor="middle" class="service-name">PI-HOLE</text>
  <text x="690" y="255" text-anchor="middle" class="subtitle">DNS Ad-block 2024.07</text>
  <text x="690" y="270" text-anchor="middle" class="service-port">:53 :8053 (host net)</text>

  <rect x="460" y="320" width="140" height="80" class="service"/>
  <text x="530" y="340" text-anchor="middle" class="service-name">TAILSCALE</text>
  <text x="530" y="355" text-anchor="middle" class="subtitle">v1.68 Exit Node</text>
  <text x="530" y="370" text-anchor="middle" class="service-port">host network</text>

  <!-- Monitoring Network -->
  <rect x="850" y="190" width="300" height="320" class="network" style="stroke:#a371f7"/>
  <text x="1000" y="210" text-anchor="middle" class="label" style="fill:#a371f7">Network: monitoring (proxied)</text>

  <rect x="870" y="220" width="120" height="70" class="service"/>
  <text x="930" y="240" text-anchor="middle" class="service-name">PROMETHEUS</text>
  <text x="930" y="255" text-anchor="middle" class="subtitle">v2.54 :9090</text>

  <rect x="1010" y="220" width="120" height="70" class="service"/>
  <text x="1070" y="240" text-anchor="middle" class="service-name">GRAFANA</text>
  <text x="1070" y="255" text-anchor="middle" class="subtitle">11.1 :3000</text>

  <rect x="870" y="310" width="120" height="70" class="service"/>
  <text x="930" y="330" text-anchor="middle" class="service-name">NODE-EXP</text>
  <text x="930" y="345" text-anchor="middle" class="subtitle">v1.8 :9100</text>

  <rect x="1010" y="310" width="120" height="70" class="service"/>
  <text x="1070" y="330" text-anchor="middle" class="service-name">CADVISOR</text>
  <text x="1070" y="345" text-anchor="middle" class="subtitle">v0.49 :8080</text>

  <!-- Apps Network -->
  <rect x="440" y="540" width="320" height="130" class="network" style="stroke:#d29922"/>
  <text x="600" y="560" text-anchor="middle" class="label" style="fill:#d29922">Network: apps_internal (no internet)</text>

  <rect x="460" y="580" width="130" height="60" class="service"/>
  <text x="525" y="598" text-anchor="middle" class="service-name">MARIADB</text>
  <text x="525" y="612" text-anchor="middle" class="subtitle">11.4 :3306</text>

  <rect x="610" y="580" width="130" height="60" class="service"/>
  <text x="675" y="598" text-anchor="middle" class="service-name">REDIS</text>
  <text x="675" y="612" text-anchor="middle" class="subtitle">7.2 :6379</text>

  <!-- Vaultwarden/Ollama in proxy network -->
  <rect x="780" y="540" width="180" height="130" class="network" style="stroke:#238636"/>
  <text x="870" y="560" text-anchor="middle" class="label" style="fill:#238636">Apps (proxied via Traefik)</text>

  <rect x="790" y="580" width="160" height="55" class="service"/>
  <text x="870" y="598" text-anchor="middle" class="service-name">NEXTCLOUD</text>
  <text x="870" y="612" text-anchor="middle" class="subtitle">29.0 :80 → cloud.DOMAIN</text>

  <rect x="790" y="650" width="75" height="55" class="service"/>
  <text x="827" y="668" text-anchor="middle" class="service-name">VAULT</text>
  <text x="827" y="682" text-anchor="middle" class="subtitle">1.32 :80</text>

  <rect x="885" y="650" width="75" height="55" class="service"/>
  <text x="922" y="668" text-anchor="middle" class="service-name">OLLAMA</text>
  <text x="922" y="682" text-anchor="middle" class="subtitle">gemma:2b</text>

  <!-- Home Assistant (host network) -->
  <rect x="980" y="540" width="180" height="130" class="network" style="stroke:#f78166"/>
  <text x="1070" y="560" text-anchor="middle" class="label" style="fill:#f78166">Host Network (smart home)</text>

  <rect x="990" y="580" width="160" height="70" class="service"/>
  <text x="1070" y="605" text-anchor="middle" class="service-name">HOME ASSISTANT</text>
  <text x="1070" y="620" text-anchor="middle" class="subtitle">2024.7 :8123</text>
  <text x="1070" y="635" text-anchor="middle" class="service-port">mDNS / Zigbee / USB</text>

  <!-- Storage -->
  <rect x="50" y="300" width="350" height="250" class="box"/>
  <text x="225" y="325" text-anchor="middle" class="title">2 TB SSD STORAGE</text>
  <text x="225" y="370" text-anchor="middle" class="subtitle">/mnt/data</text>
  <text x="80" y="395" class="subtitle">├── nextcloud/userdata</text>
  <text x="80" y="415" class="subtitle">├── vaultwarden</text>
  <text x="80" y="435" class="subtitle">├── ollama/models</text>
  <text x="80" y="455" class="subtitle">├── homeassistant</text>
  <text x="80" y="475" class="subtitle">├── grafana</text>
  <text x="80" y="495" class="subtitle">├── prometheus</text>
  <text x="80" y="515" class="subtitle">└── restic-cache</text>
  <text x="225" y="535" text-anchor="middle" class="subtitle">/mnt/backup  (Restic logs)</text>

  <!-- Backup Flow -->
  <path d="M225 550 L225 600 L700 600" class="arrow" style="stroke:#d29922"/>
  <text x="600" y="550" text-anchor="middle" class="label" style="fill:#d29922">Restic → Backblaze B2 (encrypted, deduped)</text>

  <!-- Hermes Agent -->
  <rect x="50" y="600" width="350" height="80" class="box" style="stroke:#58a6ff"/>
  <text x="225" y="625" text-anchor="middle" class="title" style="fill:#58a6ff">HERMES AGENT (headless)</text>
  <text x="225" y="645" text-anchor="middle" class="subtitle">Profile: homelab  |  Model: gemma:2b (Ollama)  |  Skills: homelab-ops, gitops-helper</text>
  <text x="225" y="662" text-anchor="middle" class="subtitle">systemd service  |  Access via: ssh vansh@pi4b-homelab → hermes --profile homelab "..."</text>

  <!-- Legend -->
  <rect x="900" y="550" width="280" height="130" class="box"/>
  <text x="920" y="570" class="title">Legend</text>
  <circle cx="930" cy="595" r="6" fill="#161b22" stroke="#30363d"/>
  <text x="945" y="600" class="subtitle">Docker Container (service)</text>
  <rect x="920" y="615" width="140" height="2" stroke="#388bfd" stroke-dasharray="5 5" fill="none"/>
  <text x="945" y="620" class="subtitle">Bridge Network (proxy)</text>
  <rect x="920" y="635" width="140" height="2" stroke="#a371f7" stroke-dasharray="5 5" fill="none"/>
  <text x="945" y="640" class="subtitle">Monitoring Network</text>
  <rect x="920" y="655" width="140" height="2" stroke="#d29922" stroke-dasharray="5 5" fill="none"/>
  <text x="945" y="660" class="subtitle">Apps Internal Network</text>
</svg>